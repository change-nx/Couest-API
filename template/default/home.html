<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>

    <style>
        :root{
            --bg:#f6f8fb;
            --card:#ffffff;
            --text:#111827;
            --sub:#6b7280;
            --border:#e5e7eb;
            --shadow:0 4px 20px rgba(0,0,0,.06);
        }
        
        @media (prefers-color-scheme: dark){
        :root{
            --bg:#0f172a;
            --card:#1e293b;
            --text:#f8fafc;
            --sub:#94a3b8;
            --border:#334155;
            --shadow:none;
        }
        }
        
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        
        body{
            background:var(--bg);
            color:var(--text);
            font-family:
            "PingFang SC",
            "Microsoft YaHei",
            sans-serif;
        }
        
        a{
            color:#3b82f6;
            text-decoration:none;
        }
        
        a:hover{
            text-decoration:underline;
        }
        
        .header{
            position:sticky;
            top:0;
            z-index:100;
            backdrop-filter:blur(20px);
            background:rgba(255,255,255,.75);
            border-bottom:1px solid var(--border);
        }
        
        @media (prefers-color-scheme: dark){
        .header{
            background:rgba(15,23,42,.85);
        }
        }
        
        .nav{
            max-width:1200px;
            margin:auto;
            padding:14px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        
        .logo{
            display:flex;
            align-items:center;
            gap:12px;
        }
        
        .logo img{
            width:42px;
            height:42px;
            border-radius:12px;
            object-fit:cover;
        }
        
        .logo h1{
            font-size:20px;
            font-weight:700;
        }
        
        .menu-btn{
            border:none;
            background:none;
            color:var(--text);
            cursor:pointer;
            font-size:20px;
        }
        
        .dropdown{
            position:absolute;
            top:65px;
            right:20px;
            width:180px;
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            overflow:hidden;
            box-shadow:var(--shadow);
            display:none;
        }
        
        .dropdown.show{
            display:block;
        }
        
        .dropdown a{
            display:block;
            padding:14px 16px;
            color:var(--text);
        }
        
        .dropdown a:hover{
            background:rgba(0,0,0,.04);
            text-decoration:none;
        }
        
        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }
        
        .search{
            width:100%;
            border:none;
            outline:none;
            background:var(--card);
            color:var(--text);
            border-radius:18px;
            padding:16px 18px;
            box-shadow:var(--shadow);
            margin-bottom:20px;
        }
        
        .api-list{
            display:flex;
            flex-direction:column;
            gap:16px;
        }
        
        .card{
            background:var(--card);
            border-radius:22px;
            padding:18px;
            box-shadow:var(--shadow);
            cursor:pointer;
            transition: transform 0.15s ease, background 0.2s;
        }
        
        .card:active{
            transform: scale(0.99);
        }
        
        .card:hover{
            background:var(--hover-bg);
        }
        
        @media (prefers-color-scheme: dark){
            .card:hover{
                background:#2d3a4e;
            }
        }
        
        .card-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
            flex-wrap:wrap;
        }
        
        .api-title{
            font-size:18px;
            font-weight:700;
            line-height:1.5;
            word-break:break-word;
            flex:1;
        }
        
        /* 调用量容器 — 放在标题下方，图标+数字无文字 */
        .stats-mini{
            display:flex;
            align-items:center;
            gap:6px;
            margin-top: 5px;
            background: transparent;
            padding:0;
        }
        
        .stats-mini svg{
            width:12px;
            height:12px;
            stroke:var(--sub);
            stroke-width:1.7;
            fill:none;
        }
        
        .stats-mini .count-num{
            font-size:12px;
            font-weight:500;
            color:var(--sub);
            letter-spacing:0.3px;
        }
        
        /* 右侧区域原有元素调整位置，不再显示访问数字区块，因为数字已挪到标题下 */
        .card-right{
            display:flex;
            align-items:center;
            gap:12px;
            flex-shrink:0;
        }
        
        /* 隐藏原本的api-access区域（因为调用量已挪到标题下方） */
        .api-access{
            display: none;
        }
        
        .doc-btn{
            display: none;  /* 完全隐藏右侧文档按钮，点击整个卡片弹出 */
        }
        
        .api-desc{
            margin-top:12px;
            color:var(--sub);
            line-height:1.8;
            display:-webkit-box;
            -webkit-line-clamp:3;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        
        .drawer{
            position:fixed;
            left:0;
            bottom:0;
            width:100%;
            height:85%;
            background:var(--card);
            border-radius:24px 24px 0 0;
            transform:translateY(100%);
            transition:.3s;
            z-index:999;
            overflow:auto;
        }
        
        .drawer.show{
            transform:none;
        }
        
        .drawer-content{
            padding:24px;
        }
        
        .close{
            position:absolute;
            top:20px;
            right:20px;
            border:none;
            background:none;
            color:var(--sub);
            cursor:pointer;
            font-size:24px;
        }
        
        .section{
            margin-top:24px;
        }
        
        .section h3{
            margin-bottom:12px;
        }
        
        .url-box{
            background:var(--bg);
            border-radius:12px;
            padding:12px;
            word-break:break-all;
        }
        
        .desc-full{
            white-space:pre-wrap;
            line-height:1.8;
        }
        
        table{
            width:100%;
            border-collapse:collapse;
        }
        
        th,td{
            border:1px solid var(--border);
            padding:10px;
            text-align:left;
        }
        
        .modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.5);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:1000;
        }
        
        .modal.show{
            display:flex;
        }
        
        .modal-card{
            position:relative;
            width:90%;
            max-width:520px;
            background:var(--card);
            border-radius:20px;
            padding:24px;
        }
        
        .stats{
            margin-top:20px;
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
        }
        
        .stat{
            background:var(--bg);
            border-radius:14px;
            padding:14px;
        }
        
        .stat-title{
            color:var(--sub);
            font-size:13px;
        }
        
        .stat-value{
            margin-top:6px;
            font-size:22px;
            font-weight:700;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="nav">

            <div class="logo">
                <img id="favicon" src="">
                <h1 id="siteTitle">Loading...</h1>
            </div>

            <button class="menu-btn" onclick="toggleMenu()">▼</button>

            <div class="dropdown" id="menu">
                <a href="index.php?action=admin">后台管理</a>
                <a href="index.php?action=friend">友情链接</a>
                <a href="#" onclick="openGroup()">交流群组</a>
                <a href="#" onclick="showStats()">数据统计</a>
            </div>

        </div>
    </header>

    <div class="container">

        <input id="search" class="search" placeholder="搜索 API..." autocomplete="off">

        <div class="api-list" id="apiList"></div>

    </div>

    <div class="drawer" id="drawer">
        <button class="close" onclick="closeDoc()">×</button>
        <div class="drawer-content" id="docContent"></div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-card">

            <button class="close" onclick="hideStats()">×</button>

            <h2>数据统计</h2>

            <div class="stats" id="statsContent"></div>

        </div>
    </div>

    <script>
        let DATA=null;
        
        fetch("./core/api.php?type=getAllApi")
        .then(r=>r.json())
        .then(res=>{
        
            DATA=res.data;
        
            document.title=DATA.title;
        
            siteTitle.innerText=DATA.title;
        
            favicon.src=DATA.favicon;
        
            renderApis(DATA.API||[]);
        
        });
        
        function formatCount(num){
            num=Number(num)||0;
            if(num>=10000){
                return (num/10000).toFixed(1)+"w";
            }
            return String(num);
        }
        
        // 渲染卡片：调用量图标+数字 放在标题下面，无文字描述，隐藏原有右侧数字和按钮
        function renderApis(list){
            apiList.innerHTML="";
            list.forEach(api=>{
                // 构造标题下方的调用量区块（纯图标+数字）
                const accessCount = formatCount(api.Access);
                const statHtml = `
                    <div class="stats-mini">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="9" stroke="currentColor"/>
                            <path d="M12 4V2" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M5 5L3 3" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M19 5L21 3" stroke="currentColor" stroke-linecap="round"/>
                        </svg>
                        <span class="count-num">${accessCount}</span>
                    </div>
                `;
                
                // 卡片主体：增加点击事件打开文档；不再显示原来的调用量文本和按钮
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                // 整个卡片点击时弹出文档详情
                cardDiv.addEventListener('click', (e) => {
                    // 防止冒泡干扰，但无所谓，直接调用showDoc
                    e.stopPropagation();
                    showDoc(api);
                });
                
                // 内部结构
                cardDiv.innerHTML = `
                    <div class="card-top">
                        <div class="api-title">
                            ${escapeHtml(api.title)}
                        </div>
                        <div class="card-right">
                            <!-- 原api-access和doc-btn已完全隐藏，保留结构但不显示任何内容 -->
                            <span class="api-access" style="display:none;">${accessCount}</span>
                            <button class="doc-btn" style="display:none;"></button>
                        </div>
                    </div>
                    <div class="stats-mini-placeholder"></div>
                    <div class="api-desc">
                        ${escapeHtml(api.desc)}
                    </div>
                `;
                
                // 将调用量区块精准插入在标题下方 (在 api-title 后面插入)
                const titleDiv = cardDiv.querySelector('.api-title');
                if(titleDiv && titleDiv.parentNode) {
                    const statContainer = document.createElement('div');
                    statContainer.className = 'stats-mini';
                    statContainer.innerHTML = `
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="9" stroke="currentColor"/>
                            <path d="M12 4V2" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M5 5L3 3" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M19 5L21 3" stroke="currentColor" stroke-linecap="round"/>
                        </svg>
                        <span class="count-num">${accessCount}</span>
                    `;
                    const parentCard = cardDiv;
                    const cardTop = parentCard.querySelector('.card-top');
                    if(cardTop) {
                        // 创建统计行容器，独占一行，紧凑
                        const statRow = document.createElement('div');
                        statRow.className = 'stats-mini';
                        statRow.style.marginTop = '6px';
                        statRow.style.marginBottom = '2px';
                        statRow.style.display = 'flex';
                        statRow.style.alignItems = 'center';
                        statRow.style.gap = '6px';
                        statRow.innerHTML = `
                            <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="1.7" fill="none">
                                <path d="M12 8V12L15 15" stroke="currentColor" stroke-linecap="round"/>
                                <circle cx="12" cy="12" r="9" stroke="currentColor"/>
                                <path d="M12 4V2" stroke="currentColor" stroke-linecap="round"/>
                                <path d="M5 5L3 3" stroke="currentColor" stroke-linecap="round"/>
                                <path d="M19 5L21 3" stroke="currentColor" stroke-linecap="round"/>
                            </svg>
                            <span class="count-num" style="color:var(--sub); font-size:15px;">${accessCount}</span>
                        `;
                        // 插入到 card-top 后面
                        cardTop.insertAdjacentElement('afterend', statRow);
                    }
                }
                

                apiList.appendChild(cardDiv);
            });
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        function buildUrl(path){
            return DATA.domain.replace(/\/$/,'')
            + '/API/'
            + path.replace(/^\//,'');
        }
        
        function showDoc(api){
            let requestRows='';
            if(api.request && Array.isArray(api.request)){
                api.request.forEach(i=>{
                    requestRows+=`
                        <tr>
                            <td>${escapeHtml(i[0]||'')}</td>
                            <td>${escapeHtml(i[1]||'')}</td>
                            <td>${escapeHtml(i[2]||'')}</td>
                        </tr>
                    `;
                });
            }
            
            let responseRows='';
            if(api.response && Array.isArray(api.response)){
                api.response.forEach(i=>{
                    responseRows+=`
                        <tr>
                            <td>${escapeHtml(i[0]||'')}</td>
                            <td>${escapeHtml(i[1]||'')}</td>
                            <td>${escapeHtml(i[2]||'')}</td>
                        </tr>
                    `;
                });
            }
            
            const url=buildUrl(api.url);
            const exampleUrl = buildUrl(api.example);
            
            docContent.innerHTML=`
                <h2>${escapeHtml(api.title)}</h2>
                <div class="section">
                    <div class="desc-full">${escapeHtml(api.desc)}</div>
                </div>
                <div class="section">
                    <h3>调用地址</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(url)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(url)}">
                            ${escapeHtml(url)}
                        </a>
                    </div>
                </div>
                <div class="section">
                    <h3>调用示例</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(exampleUrl)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(exampleUrl)}">
                            ${escapeHtml(exampleUrl)}
                        </a>
                    </div>
                </div>
                <div class="section">
                    <h3>请求参数</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>参数</th>
                                <th>类型</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${requestRows}
                        </tbody>
                    </table>
                </div>
                <div class="section">
                    <h3>返回参数</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>字段</th>
                                <th>类型</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${responseRows}
                        </tbody>
                    </table>
                </div>
            `;
            
            drawer.classList.add("show");
        }
        
        function escapeHtmlAttr(str){
            if(!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function closeDoc(){
            drawer.classList.remove("show");
        }
        
        function toggleMenu(){
            menu.classList.toggle("show");
        }
        
        function openGroup(){
            if(DATA?.link){
                window.open(DATA.link);
            }
        }
        
        function showStats(){
            statsContent.innerHTML=`
                <div class="stat">
                    <div class="stat-title">总调用</div>
                    <div class="stat-value">${formatCount(DATA.Access)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">蜘蛛访问</div>
                    <div class="stat-value">${formatCount(DATA.Spider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">今日调用</div>
                    <div class="stat-value">${formatCount(DATA.todayAccess)}</div>
                </div>
                   <div class="stat">
                    <div class="stat-title">今日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.todaySpider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日调用</div>
                    <div class="stat-value">${formatCount(DATA.yesterdayAccess)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.yesterdaySpider)}</div>
                </div>
            `;
            statsModal.classList.add("show");
        }
        
        function hideStats(){
            statsModal.classList.remove("show");
        }
        
        // 搜索功能
        search.addEventListener("input",e=>{
            if(!DATA) return;
            const keyword=e.target.value.trim().toLowerCase();
            if(!keyword){
                renderApis(DATA.API);
                return;
            }
            renderApis(
                DATA.API.filter(api=>
                    api.title.toLowerCase().includes(keyword) ||
                    api.desc.toLowerCase().includes(keyword)
                )
            );
        });
        
        // 复制链接逻辑：长按 / pointerdown 延迟复制（与原逻辑一致）
        document.addEventListener("pointerdown",e=>{
            const link=e.target.closest(".copy-link");
            if(!link) return;
            // 阻止事件冒泡，避免触发卡片点击造成文档再次打开
            e.stopPropagation();
            const timer=setTimeout(()=>{
                navigator.clipboard.writeText(
                    link.dataset.copy
                ).catch(()=>{});
            },600);
            const clear=()=>{
                clearTimeout(timer);
                document.removeEventListener("pointerup",clear);
                document.removeEventListener("pointercancel",clear);
            };
            document.addEventListener("pointerup",clear);
            document.addEventListener("pointercancel",clear);
        });
        
        // 点击菜单外部关闭菜单
        document.addEventListener("click",e=>{
            if(
                !menu.contains(e.target)
                &&
                !e.target.closest(".menu-btn")
            ){
                menu.classList.remove("show");
            }
        });
        
        // 额外注意：因为卡片整体可点击，要避免点击内部 .copy-link 时同时触发卡片文档打开。
        // 使用事件捕获或停止传播: 在卡片点击事件里判断目标是否为 .copy-link 或者其父级
        // 重新给卡片添加事件代理，全局监听卡片，但是渲染时已经添加了点击，为确保复制链接不触发卡片，在卡片点击回调里做判断。
        // 修改原 renderApis 内添加的卡片监听，增加条件判断。
        // 但因为上面的 renderApis 已实现，重构一下确保复制时不会打开抽屉: 直接修改 card 监听逻辑
        // 由于上面动态生成监听，为了保证安全，稍后用全局委托也行，但简单直接修改：再加强一下已生成的卡片（现在采用刷新后监听替换）。
        // 为了完全避免冲突，我在渲染时使用的卡片监听会检测事件目标是否来自 .copy-link 或其祖先链包含 .copy-link 或内部按钮？
        // 完善：在 card 的 click 回调中增加判断，如果 e.target 的 .closest('.copy-link') 存在，则不调用 showDoc。
        // 但是由于 renderApis 里已绑定，需覆盖一次；最简单在监听里做检查。下面更新生成过程：
        // 为了确保所有卡片正确且无冲突，改一下渲染函数中的卡片事件绑定。
        // 但由于上面已实现 renderApis，代码里需要动态修正，马上重写一下绑定防误触：
        // 已经存在的页面重新执行渲染后，卡片全新，故将卡片点击事件重新使用带有条件判断的函数。
        // 下面微调渲染函数，添加事件防护。
        const originalRender = renderApis;
        window.renderApis = function(list) {
            apiList.innerHTML = "";
            list.forEach(api => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                // 事件处理：只有点击时未触及复制链接元素才打开文档
                cardDiv.addEventListener('click', (e) => {
                    // 如果点击的元素或者其父级为 copy-link 相关或含有data-copy属性链接，不触发文档
                    if(e.target.closest('.copy-link')) {
                        e.stopPropagation();
                        return;
                    }
                    // 点击任何其他卡片区域弹出文档
                    showDoc(api);
                });
                const accessCount = formatCount(api.Access);
                cardDiv.innerHTML = `
                    <div class="card-top">
                        <div class="api-title">
                            ${escapeHtml(api.title)}
                        </div>
                        <div class="card-right">
                            <span class="api-access" style="display:none;">${accessCount}</span>
                            <button class="doc-btn" style="display:none;"></button>
                        </div>
                    </div>
                    <div class="api-desc">
                        ${escapeHtml(api.desc)}
                    </div>
                `;
                // 插入调用量区块（图标+数字）到标题下方且独占一行
                const cardTop = cardDiv.querySelector('.card-top');
                if(cardTop) {
                    const statRow = document.createElement('div');
                    statRow.className = 'stats-mini';
                    statRow.style.marginTop = '8px';
                    statRow.style.marginBottom = '4px';
                    statRow.style.display = 'flex';
                    statRow.style.alignItems = 'center';
                    statRow.style.gap = '6px';
                    statRow.innerHTML = `
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="1.7" fill="none">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="9" stroke="currentColor"/>
                            <path d="M12 4V2" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M5 5L3 3" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M19 5L21 3" stroke="currentColor" stroke-linecap="round"/>
                        </svg>
                        <span class="count-num" style="color:var(--sub); font-size:15px;">${accessCount}</span>
                    `;
                    cardTop.insertAdjacentElement('afterend', statRow);
                }
                apiList.appendChild(cardDiv);
            });
        };
        
        // 若已有DATA则重新渲染一次避免旧渲染函数
        if(DATA && DATA.API){
            renderApis(DATA.API);
        }
        
        // 重新赋值全局函数以确保以后搜索调用
        const superRender = renderApis;
        // 监听搜索重新渲染，同步新的渲染逻辑
        const searchInput = document.getElementById('search');
        if(searchInput){
            const oldListener = searchInput.getAttribute('listener')||false;
            if(!oldListener){
                searchInput.addEventListener('input', function(e){
                    if(!DATA) return;
                    const keyword = e.target.value.trim().toLowerCase();
                    if(!keyword) {
                        superRender(DATA.API);
                        return;
                    }
                    const filtered = DATA.API.filter(api => 
                        api.title.toLowerCase().includes(keyword) || 
                        api.desc.toLowerCase().includes(keyword)
                    );
                    superRender(filtered);
                });
            }
        }
        
        // 修正原因为重新定义后变量确保完全替换
        window.renderApis = superRender;
        if(DATA && DATA.API) window.renderApis(DATA.API);
        
        // 额外修复 menu toggle 中可能未定义变量
        window.toggleMenu = toggleMenu;
        window.openGroup = openGroup;
        window.showStats = showStats;
        window.hideStats = hideStats;
        window.closeDoc = closeDoc;
    </script>
</body>

</html>
