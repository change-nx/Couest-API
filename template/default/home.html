<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
            z-index: -1;
        }

        a {
            color: #93c5fd;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 顶部导航 - 玻璃态 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.12);
            padding: 16px 24px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.18);
            margin-bottom: 24px;
        }

        .nav {
            max-width: 1600px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo img {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .menu-btn {
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 14px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .dropdown {
            position: absolute;
            top: 70px;
            right: 24px;
            width: 180px;
            background: rgba(30, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none;
            backdrop-filter: blur(12px);
        }

        .dropdown.show {
            display: block;
        }

        .dropdown a {
            display: block;
            padding: 13px 18px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            transition: background 0.2s;
        }

        .dropdown a:hover {
            background: rgba(255, 255, 255, 0.12);
            text-decoration: none;
        }

        /* 主容器 - 加宽 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 10px;
        }

        /* 搜索框 */
        .search {
            width: 100%;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.13);
            color: white;
            border-radius: 15px;
            padding: 16px 22px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            font-size: 15px;
            transition: border-color 0.2s, background 0.2s;
        }

        .search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.18);
        }

        /* API列表 */
        .api-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 18px;
        }

        /* 玻璃态卡片 */
        .card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 22px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.25s, border-color 0.25s;
            border: 2px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 标题 - 调小字体防止换行成竖列 */
        .api-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5;
            word-break: break-word;
            flex: 1;
            color: white;
            min-width: 0;
        }

        /* 调用量图标+数字 */
        .stats-mini {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
            background: transparent;
            padding: 0;
        }

        .stats-mini svg {
            width: 13px;
            height: 13px;
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 1.7;
            fill: none;
        }

        .stats-mini .count-num {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.3px;
        }

        .card-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .api-access {
            display: none;
        }

        .doc-btn {
            display: none;
        }

        /* 描述文字 */
        .api-desc {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 13px;
        }

        /* 抽屉面板 */
        .drawer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 85%;
            background: rgba(20, 20, 40, 0.95);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: 0.35s ease;
            z-index: 999;
            overflow: auto;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.5);
        }

        .drawer.show {
            transform: none;
        }

        .drawer-content {
            padding: 28px;
            color: rgba(255, 255, 255, 0.9);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 24px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 26px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .section {
            margin-top: 26px;
        }

        .section h3 {
            margin-bottom: 14px;
            color: white;
            font-size: 17px;
            font-weight: 600;
        }

        .section h2 {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .url-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 13px;
        }

        .url-box a {
            color: #93c5fd;
            word-break: break-all;
        }

        .desc-full {
            white-space: pre-wrap;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 11px 14px;
            text-align: left;
            color: rgba(255, 255, 255, 0.85);
        }

        th {
            background: rgba(255, 255, 255, 0.08);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            font-size: 12px;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            position: relative;
            width: 90%;
            max-width: 520px;
            background: rgba(25, 25, 50, 0.95);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .modal-card h2 {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .stats {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .stat-value {
            margin-top: 8px;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .api-list {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 16px;
            }

            .container {
                padding: 0;
            }

            .api-list {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .card {
                padding: 18px;
            }

            .api-title {
                font-size: 14px;
            }

            .nav {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="nav">

            <div class="logo">
                <img id="favicon" src="" alt="">
                <h1 id="siteTitle">Loading...</h1>
            </div>

            <button class="menu-btn" onclick="toggleMenu()">▼</button>

            <div class="dropdown" id="menu">
                <a href="index.php?action=admin">后台管理</a>
                <a href="index.php?action=friend">友情链接</a>
                <a href="#" onclick="openGroup()">交流群组</a>
                <a href="#" onclick="showStats()">数据统计</a>
            </div>

        </div>
    </header>

    <div class="container">

        <input id="search" class="search" placeholder="搜索 API..." autocomplete="off">

        <div class="api-list" id="apiList"></div>

    </div>

    <div class="drawer" id="drawer">
        <button class="close" onclick="closeDoc()">&times;</button>
        <div class="drawer-content" id="docContent"></div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-card">

            <button class="close" onclick="hideStats()" style="position:absolute;top:18px;right:20px;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);cursor:pointer;font-size:24px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;">&times;</button>

            <h2>数据统计</h2>

            <div class="stats" id="statsContent"></div>

        </div>
    </div>

    <script>
        let DATA = null;

        fetch("./core/api.php?type=getAllApi")
            .then(r => r.json())
            .then(res => {

                DATA = res.data;

                document.title = DATA.title;

                siteTitle.innerText = DATA.title;

                favicon.src = DATA.favicon;

                renderApis(DATA.API || []);

            });

        function formatCount(num) {
            num = Number(num) || 0;
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + "w";
            }
            return String(num);
        }

        // 渲染卡片：调用量图标+数字 放在标题下面，无文字描述，隐藏原有右侧数字和按钮
        function renderApis(list) {
            apiList.innerHTML = "";
            list.forEach(api => {
                const accessCount = formatCount(api.Access);

                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showDoc(api);
                });

                cardDiv.innerHTML = `
                    <div class="card-top">
                        <div class="api-title">
                            ${escapeHtml(api.title)}
                        </div>
                        <div class="card-right">
                            <span class="api-access" style="display:none;">${accessCount}</span>
                            <button class="doc-btn" style="display:none;"></button>
                        </div>
                    </div>
                    <div class="api-desc">
                        ${escapeHtml(api.desc)}
                    </div>
                `;

                // 插入调用量区块到标题下方
                const cardTop = cardDiv.querySelector('.card-top');
                if (cardTop) {
                    const statRow = document.createElement('div');
                    statRow.className = 'stats-mini';
                    statRow.style.marginTop = '8px';
                    statRow.style.marginBottom = '4px';
                    statRow.style.display = 'flex';
                    statRow.style.alignItems = 'center';
                    statRow.style.gap = '6px';
                    statRow.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="9" stroke="currentColor"/>
                            <path d="M12 4V2" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M5 5L3 3" stroke="currentColor" stroke-linecap="round"/>
                            <path d="M19 5L21 3" stroke="currentColor" stroke-linecap="round"/>
                        </svg>
                        <span class="count-num" style="color:rgba(255,255,255,0.6); font-size:13px;">${accessCount}</span>
                    `;
                    cardTop.insertAdjacentElement('afterend', statRow);
                }

                apiList.appendChild(cardDiv);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        function buildUrl(path) {
            return DATA.domain.replace(/\/$/, '')
                + '/API/'
                + path.replace(/^\//, '');
        }

        function showDoc(api) {
            let requestRows = '';
            if (api.request && Array.isArray(api.request)) {
                api.request.forEach(i => {
                    requestRows += `
                        <tr>
                            <td>${escapeHtml(i[0] || '')}</td>
                            <td>${escapeHtml(i[1] || '')}</td>
                            <td>${escapeHtml(i[2] || '')}</td>
                        </tr>
                    `;
                });
            }

            let responseRows = '';
            if (api.response && Array.isArray(api.response)) {
                api.response.forEach(i => {
                    responseRows += `
                        <tr>
                            <td>${escapeHtml(i[0] || '')}</td>
                            <td>${escapeHtml(i[1] || '')}</td>
                            <td>${escapeHtml(i[2] || '')}</td>
                        </tr>
                    `;
                });
            }

            const url = buildUrl(api.url);
            const exampleUrl = buildUrl(api.example);

            docContent.innerHTML = `
                <h2>${escapeHtml(api.title)}</h2>
                <div class="section">
                    <div class="desc-full">${escapeHtml(api.desc)}</div>
                </div>
                <div class="section">
                    <h3>调用地址</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(url)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(url)}">
                            ${escapeHtml(url)}
                        </a>
                    </div>
                </div>
                <div class="section">
                    <h3>调用示例</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(exampleUrl)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(exampleUrl)}">
                            ${escapeHtml(exampleUrl)}
                        </a>
                    </div>
                </div>
                <div class="section">
                    <h3>请求参数</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>参数</th>
                                <th>类型</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${requestRows}
                        </tbody>
                    </table>
                </div>
                <div class="section">
                    <h3>返回参数</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>字段</th>
                                <th>类型</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${responseRows}
                        </tbody>
                    </table>
                </div>
            `;

            drawer.classList.add("show");
        }

        function escapeHtmlAttr(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function closeDoc() {
            drawer.classList.remove("show");
        }

        function toggleMenu() {
            menu.classList.toggle("show");
        }

        function openGroup() {
            if (DATA?.link) {
                window.open(DATA.link);
            }
        }

        function showStats() {
            statsContent.innerHTML = `
                <div class="stat">
                    <div class="stat-title">总调用</div>
                    <div class="stat-value">${formatCount(DATA.Access)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">蜘蛛访问</div>
                    <div class="stat-value">${formatCount(DATA.Spider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">今日调用</div>
                    <div class="stat-value">${formatCount(DATA.todayAccess)}</div>
                </div>
                   <div class="stat">
                    <div class="stat-title">今日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.todaySpider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日调用</div>
                    <div class="stat-value">${formatCount(DATA.yesterdayAccess)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.yesterdaySpider)}</div>
                </div>
            `;
            statsModal.classList.add("show");
        }

        function hideStats() {
            statsModal.classList.remove("show");
        }

        // 搜索功能
        search.addEventListener("input", e => {
            if (!DATA) return;
            const keyword = e.target.value.trim().toLowerCase();
            if (!keyword) {
                renderApis(DATA.API);
                return;
            }
            renderApis(
                DATA.API.filter(api =>
                    api.title.toLowerCase().includes(keyword) ||
                    api.desc.toLowerCase().includes(keyword)
                )
            );
        });

        // 复制链接逻辑
        document.addEventListener("pointerdown", e => {
            const link = e.target.closest(".copy-link");
            if (!link) return;
            e.stopPropagation();
            const timer = setTimeout(() => {
                navigator.clipboard.writeText(
                    link.dataset.copy
                ).catch(() => { });
            }, 600);
            const clear = () => {
                clearTimeout(timer);
                document.removeEventListener("pointerup", clear);
                document.removeEventListener("pointercancel", clear);
            };
            document.addEventListener("pointerup", clear);
            document.addEventListener("pointercancel", clear);
        });

        // 点击菜单外部关闭菜单
        document.addEventListener("click", e => {
            if (
                !menu.contains(e.target) &&
                !e.target.closest(".menu-btn")
            ) {
                menu.classList.remove("show");
            }
        });

        // 全局渲染函数（供搜索复用）
        window.renderApis = renderApis;

        // 暴露全局函数
        window.toggleMenu = toggleMenu;
        window.openGroup = openGroup;
        window.showStats = showStats;
        window.hideStats = hideStats;
        window.closeDoc = closeDoc;
    </script>
</body>

</html>
