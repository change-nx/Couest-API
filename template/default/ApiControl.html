<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>API 管理 · 控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
            z-index: -1;
        }

        /* 顶部导航 - 玻璃态 */
        .app-bar {
            background: rgba(255, 255, 255, 0.12);
            border-bottom: 2px solid rgba(255, 255, 255, 0.18);
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: blur(12px);
            border-radius: 15px;
            margin-bottom: 24px;
        }
        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            font-weight: 600;
            font-size: 1rem;
            color: white;
            letter-spacing: -0.3px;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dropdown { position: relative; }
        .menu-trigger {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .menu-trigger:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .dropdown-arrow { font-size: 11px; opacity: 0.7; }
        .dropdown-panel {
            position: absolute;
            top: 46px;
            left: 0;
            background: rgba(20, 20, 45, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 170px;
            opacity: 0;
            visibility: hidden;
            transition: 0.15s;
            z-index: 40;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }
        .dropdown-panel.open { opacity: 1; visibility: visible; }
        .dropdown-panel a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }
        .dropdown-panel a:last-child { border-bottom: none; }
        .dropdown-panel a:hover { background: rgba(255, 255, 255, 0.1); }
        .logout-button {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-button:hover {
            border-color: #f87171;
            color: #fca5a5;
            background: rgba(248, 113, 113, 0.15);
        }

        /* 主内容区 */
        .main-content {
            max-width: 1600px;
            margin: 32px auto;
            padding: 0 28px;
        }

        /* 表格卡片 - 玻璃态 */
        .data-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }
        .responsive-table { width: 100%; border-collapse: collapse; }
        .responsive-table th {
            text-align: left;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.3px;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.12);
        }
        .responsive-table td {
            padding: 16px 20px;
            font-size: 0.83rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.92);
            vertical-align: middle;
        }
        .responsive-table tr:last-child td { border-bottom: none; }
        .responsive-table tr:hover td { background: rgba(255, 255, 255, 0.08); }

        .id-badge {
            font-family: monospace;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.12);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.73rem;
            display: inline-block;
            color: #93c5fd;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .api-url {
            font-family: 'SF Mono', monospace;
            font-size: 0.76rem;
            color: #93c5fd;
            word-break: break-all;
            max-width: 320px;
            display: inline-block;
        }
        .action-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.75);
        }
        .action-chip.edit:hover {
            background: rgba(147, 197, 253, 0.2);
            border-color: #93c5fd;
            color: #93c5fd;
        }
        .action-chip.delete:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #f87171;
            color: #fca5a5;
        }

        /* 标题列加宽防换行 */
        .responsive-table td:nth-child(2) {
            max-width: 400px;
            word-wrap: break-word;
        }
        .responsive-table td:nth-child(2) strong {
            font-size: 0.83rem;
            display: inline-block;
            max-width: 380px;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* 分页 */
        .pagination-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
            align-items: center;
        }
        .page-item {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 0.74rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.7);
        }
        .page-item.active {
            background: rgba(99, 102, 241, 0.7);
            border-color: #818cf8;
            color: white;
        }
        .page-item.disabled { opacity: 0.35; pointer-events: none; }
        .page-item:not(.disabled):hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.35);
            color: white;
        }

        /* FAB */
        .fab-add {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            background: rgba(99, 102, 241, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            color: white;
            font-size: 26px;
            font-weight: 400;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 45;
            backdrop-filter: blur(10px);
        }
        .fab-add:hover {
            background: rgba(99, 102, 241, 0.9);
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.35);
        }

        /* 模态框 - 玻璃态 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal-mask.active { opacity: 1; visibility: visible; }
        .modal-container {
            background: rgba(20, 20, 45, 0.95);
            width: 700px;
            max-width: 94vw;
            max-height: 88vh;
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .modal-header {
            padding: 20px 26px;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 1.05rem;
            color: white;
        }
        .modal-body { padding: 24px 26px; overflow-y: auto; flex: 1; }
        .field-group { margin-bottom: 20px; }
        .field-group label {
            font-size: 0.8rem;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.65);
        }
        .field-group input, .field-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.84rem;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        .field-group input::placeholder,
        .field-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .field-group input:focus, .field-group textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
            background: rgba(255, 255, 255, 0.14);
        }
        .param-block {
            margin-top: 28px;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .param-block-title {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }
        .param-inner-table { width: 100%; border-collapse: collapse; }
        .param-inner-table th {
            text-align: left;
            padding: 11px 12px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .param-inner-table td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .param-inner-table input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1.2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.78rem;
            color: white;
            transition: all 0.2s;
        }
        .param-inner-table input:focus {
            border-color: #818cf8;
            outline: none;
            background: rgba(255, 255, 255, 0.14);
        }
        .remove-param-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #f87171;
            opacity: 0.7;
            transition: 0.2s;
            padding: 0 6px;
        }
        .remove-param-btn:hover { opacity: 1; }
        .add-param-button {
            margin: 14px 16px 16px 16px;
            background: transparent;
            border: 1.5px dashed rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.73rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #93c5fd;
            display: inline-block;
        }
        .add-param-button:hover {
            background: rgba(147, 197, 253, 0.12);
            border-style: solid;
            border-color: #93c5fd;
        }
        .modal-footer {
            padding: 18px 26px;
            border-top: 1.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-modal {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.85);
        }
        .btn-primary-modal {
            background: rgba(99, 102, 241, 0.7);
            border-color: #818cf8;
            color: white;
        }
        .btn-primary-modal:hover { background: rgba(99, 102, 241, 0.9); }
        .toast-feedback {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 60, 0.9);
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 26px;
            border-radius: 100px;
            font-size: 0.8rem;
            z-index: 300;
            font-weight: 500;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 900px) {
            .nav-container { padding: 10px 20px; }
            .main-content { padding: 0 16px; }
            .responsive-table th, .responsive-table td { padding: 11px 13px; }
            .api-url { max-width: 180px; font-size: 0.7rem; }
            .responsive-table td:nth-child(2) strong { max-width: 200px; font-size: 0.78rem; }
        }
    </style>
</head>
<body>
<div class="app-bar">
    <div class="nav-container">
        <div class="logo-area">API 管理</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="dropdown">
                <button class="menu-trigger" id="navDropdownBtn">
                    后台菜单
                    <span class="dropdown-arrow">&#8964;</span>
                </button>
                <div class="dropdown-panel" id="navDropdownPanel">
                    <a href="index.php?action=admin&type=API">API管理</a>
                    <a href="index.php?action=admin&type=friend">友链管理</a>
                    <a href="index.php?action=admin&type=set">站点配置</a>
                </div>
            </div>
            <button class="logout-button" id="logoutBtn">退出登录</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="tableWrapper" style="min-height: 300px;">加载中...</div>
    <div id="paginationWrapper"></div>
</div>

<button class="fab-add" id="createFab">+</button>

<script>
    let globalApiList = [];
    let currentPageNum = 1;
    let rowsPerPage = 10;

    async function callBackend(payload) {
        const formData = new URLSearchParams();
        for (const [key, val] of Object.entries(payload)) {
            if (val !== undefined && val !== null) formData.append(key, val);
        }
        const response = await fetch('./core/post.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        return await response.json();
    }

    function showMessage(msg, isError = false) {
        let oldToast = document.querySelector('.toast-feedback');
        if (oldToast) oldToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-feedback';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function renderApiTable(apiItems, page, pageSize) {
        const start = (page - 1) * pageSize;
        const pageItems = apiItems.slice(start, start + pageSize);
        const isEmpty = apiItems.length === 0;

        if (isEmpty) {
            return `
                <div class="data-card">
                    <div class="empty-state">
                        &#128222; 暂无 API 接口数据<br>点击右下角「+」开始创建
                    </div>
                </div>
            `;
        }

        let rows = '';
        pageItems.forEach(item => {
            const safeId = escapeHtml(item.id || '');
            const safeTitle = escapeHtml(item.title || '未命名');
            rows += `
                <tr>
                    <td><span class="id-badge">${safeId}</span></td>
                    <td style="width:auto;max-width:420px"><strong>${safeTitle}</strong></td>
                    <td style="width:130px">
                        <div class="action-group">
                            <button class="action-chip edit" data-raw='${JSON.stringify(item).replace(/'/g, "&#39;")}'>编辑</button>
                            <button class="action-chip delete" data-id="${safeId}">删除</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        return `
            <div class="data-card">
                <table class="responsive-table">
                    <thead>
                        <tr><th>ID</th><th>标题</th><th>操作</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    }

    function renderPaginationControls(totalItems, currentPage, pageSize) {
        const totalPages = Math.ceil(totalItems / pageSize);
        if (totalPages <= 1) return '';
        let html = `<div class="pagination-bar">`;
        html += `<button class="page-item ${currentPage === 1 ? 'disabled' : ''}" id="prevPageBtn">&larr; 上一页</button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-item ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="page-item ${currentPage === totalPages ? 'disabled' : ''}" id="nextPageBtn">下一页 &rarr;</button>`;
        html += `</div>`;
        return html;
    }

    function bindTableEvents() {
        document.querySelectorAll('.action-chip.edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                try {
                    const rawJson = btn.getAttribute('data-raw');
                    const itemData = JSON.parse(rawJson);
                    openModal(itemData);
                } catch (err) { showMessage('数据解析失败', true); }
            });
        });
        document.querySelectorAll('.action-chip.delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                if (!confirm(`确认删除 API "${id}" 吗？`)) return;
                const res = await callBackend({ type: 'delApi', id: id });
                if (res.code === 200) { showMessage('删除成功'); await reloadAllData(); }
                else { showMessage(res.msg || '删除失败', true); }
            });
        });
    }

    function bindPaginationEvents() {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const totalPages = Math.ceil(globalApiList.length / rowsPerPage);
        if (prevBtn) prevBtn.onclick = () => { if (currentPageNum > 1) { currentPageNum--; refreshUI(); } };
        if (nextBtn) nextBtn.onclick = () => { if (currentPageNum < totalPages) { currentPageNum++; refreshUI(); } };
        document.querySelectorAll('.page-item[data-page]').forEach(btn => {
            btn.onclick = () => {
                const page = parseInt(btn.getAttribute('data-page'));
                if (!isNaN(page) && page !== currentPageNum) { currentPageNum = page; refreshUI(); }
            };
        });
    }

    function refreshUI() {
        const tableHtml = renderApiTable(globalApiList, currentPageNum, rowsPerPage);
        const paginationHtml = renderPaginationControls(globalApiList.length, currentPageNum, rowsPerPage);
        document.getElementById('tableWrapper').innerHTML = tableHtml;
        document.getElementById('paginationWrapper').innerHTML = paginationHtml;
        bindTableEvents(); bindPaginationEvents();
    }

    async function reloadAllData() {
        const res = await callBackend({ type: 'getApi' });
        if (res.code === 200) {
            globalApiList = res.data || [];
            const maxPage = Math.ceil(globalApiList.length / rowsPerPage) || 1;
            if (currentPageNum > maxPage) currentPageNum = maxPage;
            refreshUI();
        } else {
            document.getElementById('tableWrapper').innerHTML = `<div class="data-card"><div class="empty-state">&#10060; 加载失败: ${res.msg || '网络错误'}</div></div>`;
            document.getElementById('paginationWrapper').innerHTML = '';
        }
    }

    function openModal(editData = null) {
        const isEdit = !!(editData && editData.id);
        let requestParams = (editData?.request && Array.isArray(editData.request))
            ? editData.request.map(row => [row[0] || '', row[1] || '', row[2] || '']) : [];
        let responseParams = (editData?.response && Array.isArray(editData.response))
            ? editData.response.map(row => [row[0] || '', row[1] || '', row[2] || '']) : [];

        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-container">
                <div class="modal-header">${isEdit ? '&#9998; 编辑接口' : '&#10133; 新建接口'}</div>
                <div class="modal-body">
                    <div class="field-group"><label>ID *</label><input id="apiId" placeholder="唯一标识，例如 weather_api" value="${escapeHtml(editData?.id || '')}"></div>
                    <div class="field-group"><label>标题 *</label><input id="apiTitle" value="${escapeHtml(editData?.title || '')}"></div>
                    <div class="field-group"><label>描述 *</label><textarea id="apiDesc" rows="2">${escapeHtml(editData?.desc || '')}</textarea></div>
                    <div class="field-group"><label>调用地址 *</label><input id="apiUrl" value="${escapeHtml(editData?.url || '')}" placeholder=""></div>
                    <div class="field-group"><label>示例地址</label><input id="apiExample" value="${escapeHtml(editData?.example || '')}"></div>
                    <div class="field-group"><label>请求方式</label><input id="apiMethod" value="${escapeHtml(editData?.method || 'GET')}"></div>
                    
                    <div class="param-block">
                        <div class="param-block-title">&#128228; 请求参数</div>
                        <div id="requestParamsContainer"></div>
                        <button type="button" class="add-param-button" id="addReqRowBtn">+ 添加参数</button>
                    </div>

                    <div class="param-block">
                        <div class="param-block-title">&#128229; 返回参数</div>
                        <div id="responseParamsContainer"></div>
                        <button type="button" class="add-param-button" id="addResRowBtn">+ 添加参数</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal" id="modalCancelBtn">取消</button>
                    <button class="btn-modal btn-primary-modal" id="modalConfirmBtn">${isEdit ? '保存修改' : '创建'}</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.classList.add('active');

        function renderParamTable(containerId, paramArray) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const render = () => {
                let html = `<table class="param-inner-table"><thead><tr><th>参数名</th><th>类型</th><th>说明</th><th style="width:40px"></th></tr></thead><tbody>`;
                paramArray.forEach((row, idx) => {
                    html += `
                        <tr data-idx="${idx}">
                            <td><input type="text" class="param-name-input" value="${escapeHtml(row[0])}" data-rowidx="${idx}" data-col="0" placeholder="name"></td>
                            <td><input type="text" class="param-type-input" value="${escapeHtml(row[1])}" data-rowidx="${idx}" data-col="1" placeholder="string/int"></td>
                            <td><input type="text" class="param-desc-input" value="${escapeHtml(row[2])}" data-rowidx="${idx}" data-col="2" placeholder="说明"></td>
                            <td><button class="remove-param-btn" data-idx="${idx}">&#10005;</button></td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
                container.innerHTML = html;

                container.querySelectorAll('input').forEach(inp => {
                    inp.addEventListener('change', (e) => {
                        const rowIdx = parseInt(inp.getAttribute('data-rowidx'));
                        const colIdx = parseInt(inp.getAttribute('data-col'));
                        if (!isNaN(rowIdx) && paramArray[rowIdx] && !isNaN(colIdx)) paramArray[rowIdx][colIdx] = inp.value;
                    });
                });
                container.querySelectorAll('.remove-param-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(btn.getAttribute('data-idx'));
                        if (!isNaN(idx)) { paramArray.splice(idx, 1); render(); }
                    });
                });
            };
            render();
        }

        renderParamTable('requestParamsContainer', requestParams);
        renderParamTable('responseParamsContainer', responseParams);

        document.getElementById('addReqRowBtn').onclick = () => { requestParams.push(['', '', '']); renderParamTable('requestParamsContainer', requestParams); };
        document.getElementById('addResRowBtn').onclick = () => { responseParams.push(['', '', '']); renderParamTable('responseParamsContainer', responseParams); };

        const closeModal = () => modalDiv.remove();
        document.getElementById('modalCancelBtn').onclick = closeModal;

        document.getElementById('modalConfirmBtn').onclick = async () => {
            const id = document.getElementById('apiId').value.trim();
            const title = document.getElementById('apiTitle').value.trim();
            const desc = document.getElementById('apiDesc').value.trim();
            const url = document.getElementById('apiUrl').value.trim();
            const example = document.getElementById('apiExample').value.trim();
            const method = document.getElementById('apiMethod').value.trim();

            if (!id || !title || !desc || !url || !method) { showMessage('请完整填写 ID、标题、描述、地址和请求方式', true); return; }

            const action = isEdit ? 'setApi' : 'addApi';
            const payload = { type: action, id, title, desc, url, example, method, request: JSON.stringify(requestParams), response: JSON.stringify(responseParams) };
            const res = await callBackend(payload);
            if (res.code === 200) { showMessage(isEdit ? '更新成功' : '创建成功'); closeModal(); currentPageNum = 1; await reloadAllData(); }
            else { showMessage(res.msg || '操作失败，请检查后端', true); }
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>'; return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) { return c; });
    }

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await callBackend({ type: 'clear' }); window.location.href = 'index.php?action=admin&type=login';
    });

    const dropBtn = document.getElementById('navDropdownBtn');
    const dropPanel = document.getElementById('navDropdownPanel');
    if (dropBtn && dropPanel) {
        dropBtn.addEventListener('click', (e) => { e.stopPropagation(); dropPanel.classList.toggle('open'); });
        document.addEventListener('click', (e) => { if (!dropBtn.contains(e.target) && !dropPanel.contains(e.target)) dropPanel.classList.remove('open'); });
    }

    document.getElementById('createFab')?.addEventListener('click', () => openModal(null));
    (async () => { await reloadAllData(); })();
</script>
</body>
</html>
