<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>友情链接</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea; min-height: 100vh; padding: 20px; color: white;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); pointer-events: none; z-index: -1;
        }

        a { color: #93c5fd; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .carousel-section {
            background: rgba(255, 255, 255, 0.12); border-radius: 18px;
            margin-bottom: 24px; padding: 20px 16px 24px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px); transition: all 0.2s;
        }

        .carousel-title {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.15rem; font-weight: 600; margin-bottom: 18px;
            padding-left: 6px; color: white;
        }
        .carousel-title span:first-child {
            background: #818cf8; width: 6px; height: 24px; border-radius: 6px; display: inline-block;
        }

        .swiper-container { overflow: hidden; border-radius: 18px; position: relative; }
        .swiper-wrapper { display: flex; transition-timing-function: cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .swiper-slide {
            flex-shrink: 0; width: 100%; background: rgba(255, 255, 255, 0.08);
            border-radius: 18px; overflow: hidden; transition: all 0.2s;
        }
        .friend-carousel-card {
            display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.1); border-radius: 18px; overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
        }
        .friend-carousel-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25); }
        .carousel-img { width: 100%; height: 160px; object-fit: cover; background: rgba(255, 255, 255, 0.08); display: block; }
        .carousel-info { padding: 18px 16px 20px; }
        .carousel-info h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; color: white; }
        .carousel-desc { color: rgba(255, 255, 255, 0.65); font-size: 0.88rem; line-height: 1.45; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .carousel-link-badge { display: inline-flex; align-items: center; gap: 6px; color: #93c5fd; font-size: 0.85rem; font-weight: 500; }

        .dots { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
        .dot { width: 8px; height: 8px; background: rgba(255, 255, 255, 0.25); border-radius: 10px; transition: 0.2s; cursor: pointer; }
        .dot.active { width: 24px; background: #818cf8; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 20px 40px; position: relative; z-index: 1; }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.12); padding: 16px 24px;
            border-radius: 15px; backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.18); margin-bottom: 20px;
        }

        .nav { max-width: 1400px; margin: auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo h1 { font-size: 20px; font-weight: 700; color: white; }
        .menu-btn {
            border: none; background: rgba(255, 255, 255, 0.15); color: white;
            cursor: pointer; font-size: 18px; padding: 8px 14px; border-radius: 10px; transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.25); }
        .dropdown {
            position: absolute; top: 68px; right: 20px; width: 180px;
            background: rgba(20, 20, 45, 0.92); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none; backdrop-filter: blur(12px);
        }
        .dropdown.show { display: block; }
        .dropdown a { display: block; padding: 14px 16px; color: rgba(255, 255, 255, 0.9); font-size: 14px; transition: background 0.2s; }
        .dropdown a:hover { background: rgba(255, 255, 255, 0.1); text-decoration: none; }

        .api-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

        .card {
            background: rgba(255, 255, 255, 0.12); border-radius: 16px; padding: 20px;
            cursor: pointer; transition: transform 0.2s, background 0.25s, border-color 0.25s;
            border: 2px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }
        .card:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.18); border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2); }
        .card:active { transform: scale(0.98); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
        .api-title { font-size: 15px; font-weight: 700; line-height: 1.5; word-break: break-word; flex: 1; color: white; min-width: 0; }

        .stats-mini { display: flex; align-items: center; gap: 6px; margin-top: 5px; background: transparent; padding: 0; }
        .stats-mini svg { width: 13px; height: 13px; stroke: rgba(255, 255, 255, 0.55); stroke-width: 1.7; fill: none; }
        .stats-mini .count-num { font-size: 12px; font-weight: 500; color: rgba(255, 255, 255, 0.55); }

        .card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .api-access { display: none; }
        .doc-btn { display: none; }

        .api-desc { margin-top: 12px; color: rgba(255, 255, 255, 0.65); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 13px; }

        .friend-image-thumb { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; background: rgba(255, 255, 255, 0.1); border: 1.5px solid rgba(255, 255, 255, 0.2); }

        .empty-state { text-align: center; padding: 60px 20px; background: rgba(255, 255, 255, 0.1); border-radius: 22px; color: rgba(255, 255, 255, 0.5); border: 2px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(8px); }

        .loading-skeleton { background: rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 18px; margin-bottom: 16px; display: flex; gap: 14px; align-items: center; border: 2px solid rgba(255, 255, 255, 0.1); }
        .skeleton-img { width: 52px; height: 52px; background: rgba(255, 255, 255, 0.15); border-radius: 14px; animation: pulse 1.2s infinite; }
        .skeleton-text { flex: 1; }
        .skeleton-line { height: 18px; background: rgba(255, 255, 255, 0.15); border-radius: 10px; margin-bottom: 8px; width: 80%; animation: pulse 1.2s infinite; }
        .skeleton-line.short { width: 60%; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }

        footer { text-align: center; padding: 32px 20px; color: rgba(255, 255, 255, 0.5); font-size: 0.8rem; border-top: 1.5px solid rgba(255, 255, 255, 0.1); margin-top: 32px; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; }
            .container { padding: 12px; }
            .api-list { grid-template-columns: 1fr; gap: 12px; }
            .card { padding: 16px; }
            .api-title { font-size: 14px; }
            .friend-image-thumb { width: 42px; height: 42px; }
            .carousel-info h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="nav">
        <div class="logo"><h1>友情链接</h1></div>
        <button class="menu-btn" id="menuBtn" aria-label="菜单">&#9776;</button>
        <div class="dropdown" id="dropdown"><a href="./#">首页</a></div>
    </div>
</div>

<main class="container">
    <div class="carousel-section" id="carouselSection" style="display:none;">
        <div class="carousel-title"><span></span><span>&#10024; 精选伙伴</span></div>
        <div class="swiper-container" id="swiperContainer"><div class="swiper-wrapper" id="carouselWrapper"></div></div>
        <div class="dots" id="dotsContainer"></div>
    </div>
    <div id="friendList" class="api-list">
        <div class="loading-skeleton"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="loading-skeleton"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="loading-skeleton"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
    </div>
</main>

<script>
    (function(){
        const fc=document.getElementById('friendList'),cs=document.getElementById('carouselSection'),cw=document.getElementById('carouselWrapper'),dc=document.getElementById('dotsContainer');
        let fd=[],ci=[],curIdx=0,intv=null;

        async function ff(){try{
            const r=await fetch('./core/api.php?type=getFriend');if(!r.ok)throw new Error(`HTTP ${r.status}`);
            const d=await r.json();if(d.code===200&&Array.isArray(d.data)){
                fd=d.data.filter(i=>i&&typeof i==='object'&&i.title&&i.url);
                fd.forEach((it,idx)=>{it._=idx;if(!it.image)it.image='';});renderAll();
            }else throw new Error(d.msg||'数据格式异常');
        }catch(e){console.error('获取友链失败:',e);fc.innerHTML=`<div class="empty-state">&#9888; 加载失败，请检查网络或api接口<br>尝试刷新页面</div>`;cs.style.display='none';}}

        function renderAll(){renderCardList(fd);updateCarousel(fd);}

        function renderCardList(data){
            if(!data.length){fc.innerHTML=`<div class="empty-empty">&#10024; 暂无友链数据，期待新朋友加入~</div>`;return;}
            fc.innerHTML=data.map(f=>{
                const ih=f.image&&f.image.trim()?`<img class="friend-image-thumb" src="${eh(f.image)}" alt="${eh(f.title)}" onerror="this.onerror=null;this.src='';this.background='rgba(255,255,255,0.1)';">`:`<div class="friend-image-thumb" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#6366f1,#8b5cf6);color:white;font-weight:bold;font-size:20px;border:1.5px solid rgba(255,255,255,0.2);">${eh(f.title.charAt(0)||'友')}</div>`;
                return `<div class="card" data-url="${ea(f.url)}" data-title="${ea(f.title)}"><div class="card-top">${ih}<div style="flex:1;"><div class="api-title">${eh(f.title)}</div></div></div><div class="api-desc">${eh(f.desc||'暂无介绍，期待探索更多精彩~')}</div></div>`;
            }).join('');
            document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',e=>{e.stopPropagation();const u=c.getAttribute('data-url');if(u&&u.trim())window.open(u,'_blank','noopener noreferrer');else alert('当前友链暂无有效网址');}));
        }

        function updateCarousel(dl){if(!dl||!dl.length){cs.style.display='none';if(intv)clearInterval(intv);return;}
            const mc=Math.min(dl.length,6);ci=dl.slice(0,mc);
            if(!ci.length){cs.style.display='none';return;}
            cs.style.display='block';renderSlides();curIdx=0;updPos();genDots();startAuto();
        }

        function renderSlides(){if(!cw)return;
            cw.innerHTML=ci.map(it=>{
                const im=it.image&&it.image.trim()?it.image:'';
                const imH=im?`<img class="carousel-img" src="${eh(im)}" alt="${eh(it.title)}" onerror="this.src='';this.style.background='rgba(255,255,255,0.08)';">`:`<div class="carousel-img" style="background:linear-gradient(120deg,#1e1b4b,#312e81);display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;">&#10024;</div>`;
                return `<div class="swiper-slide"><div class="friend-carousel-card" data-url="${ea(it.url)}">${imH}<div class="carousel-info"><h3>${eh(it.title)}</h3><div class="carousel-desc">${eh(it.desc||'发现宝藏网站，点击立即探索')}</div></div></div></div>`;
            }).join('');
            document.querySelectorAll('.friend-carousel-card').forEach(c=>c.addEventListener('click',e=>{e.stopPropagation();const u=c.getAttribute('data-url');if(u&&u.trim())window.open(u,'_blank','noopener noreferrer');else alert('当前友链暂无有效网址');}));
        }

        function updPos(){if(!cw||!ci.length)return;const ct=cw.parentElement;if(!ct)return;const sw=ct.clientWidth;of=-curIdx*sw;cw.style.transform=`translateX(${of}px)`;cw.style.transition='transform 0.35s ease-out';
            document.querySelectorAll('.dot').forEach((d,i)=>{if(i===curIdx)d.classList.add('active');else d.classList.remove('active');});
        }

        function genDots(){if(!dc)return;if(ci.length<=1){dc.innerHTML='';return;}
            dc.innerHTML=[...Array(ci.length)].map((_,i)=>`<div class="dot ${i===curIdx?'active':''}" data-index="${i}"></div>`).join('');
            document.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',e=>{const i=parseInt(d.getAttribute('data-index'));if(!isNaN(i)&&i!==curIdx){curIdx=i;updPos();resetAuto();}}));
        }

        function gNext(){if(!ci.length)return;curIdx=(curIdx+1)%ci.length;updPos();resetAuto();}
        function sAuto(){if(intv)clearInterval(intv);if(ci.length<=1)return;intv=setInterval(gNext,4000);}
        function rAuto(){if(intv){clearInterval(intv);sAuto();}}

        let rt;window.addEventListener('resize',()=>{if(ci.length){if(rt)clearTimeout(rt);rt=setTimeout(updPos,100);}});

        function eh(s){if(!s)return'';return s.replace(/[&<>]/g,m=>{if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g,c=>c);}
        function ea(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

        const mb=document.getElementById('menuBtn'),dd=document.getElementById('dropdown');
        if(mb&&dd){mb.addEventListener('click',e=>{e.stopPropagation();dd.classList.toggle('show');});document.addEventListener('click',e=>{if(!dd.contains(e.target)!==mb){dd.classList.remove('show');}});}ff();
    })();
</script>
</body>
</html>
