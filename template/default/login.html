<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased; padding: 20px;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); pointer-events: none; z-index: -1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.12);
            padding: 48px 42px; width: 430px; border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px); transition: all 0.25s ease;
        }

        .login-card:hover { transform: translateY(-3px); box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35); }

        .login-card h2 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 10px; color: white; }
        .login-sub { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin-bottom: 34px; }

        .input-group { margin-bottom: 22px; }
        .input-label { display: block; font-size: 0.84rem; font-weight: 500; margin-bottom: 8px; color: rgba(255, 255, 255, 0.65); }

        .input-field {
            width: 100%; padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; font-size: 0.94rem; color: white;
            transition: all 0.2s; outline: none; font-family: inherit;
        }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.35); }
        .input-field:focus {
            border-color: #818cf8; background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2);
        }

        .login-btn {
            width: 100%; padding: 14px 20px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px; font-weight: 600; font-size: 1rem;
            color: white; cursor: pointer; transition: all 0.25s;
            margin-top: 10px; font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }
        .login-btn:hover {
            background: rgba(99, 102, 241, 0.7); border-color: #818cf8;
            color: white; box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }
        .login-btn:active { transform: translateY(0); }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 45, 0.92); backdrop-filter: blur(12px);
            color: white; padding: 10px 24px; border-radius: 40px; font-size: 0.85rem;
            z-index: 1000; font-weight: 500; border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>后台登录</h2>
        <div class="input-group">
            <label class="input-label">账号</label>
            <input type="text" id="adminName" class="input-field" placeholder="请输入账号" autocomplete="off">
        </div>
        <div class="input-group">
            <label class="input-label">密码</label>
            <input type="password" id="adminPwd" class="input-field" placeholder="请输入密码">
        </div>
        <button id="loginBtn" class="login-btn">登录</button>
    </div>

    <script>
        function showToast(msg){let t=document.querySelector('.toast');if(t)t.remove();const d=document.createElement('div');d.className='toast';d.innerText=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}

        document.getElementById('loginBtn').onclick=async()=>{
            const ad=document.getElementById('adminName').value.trim(),pw=document.getElementById('adminPwd').value;
            if(!ad||!pw){showToast('请输入账号和密码');return;}
            const fd=new URLSearchParams();fd.append('type','login');fd.append('admin',ad);fd.append('password',pw);
            try{const r=await fetch('./core/post.php',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()});
            const d=await r.json();if(d.code===200)window.location.href='index.php?action=admin&type=API';else showToast(d.msg||'登录失败');
            }catch(e){showToast('网络错误');}
        };

        document.getElementById('adminPwd').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});
    </script>
</body>
</html>
