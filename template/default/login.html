<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1a1f2e;
            --text-secondary: #5a6378;
            --border: #e8ecf0;
            --accent: #0066ff;
            --accent-hover: #0052cc;
            --accent-light: rgba(0, 102, 255, 0.06);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.08);
            --radius-xl: 28px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: all 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --surface: #161b22;
                --text-primary: #f0f3f8;
                --text-secondary: #8b949e;
                --border: #21262d;
                --accent: #3b82f6;
                --accent-hover: #5b9cff;
                --accent-light: rgba(59, 130, 246, 0.08);
            }
        }

        .login-card {
            background: var(--surface);
            padding: 48px 44px;
            width: 440px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 48px rgba(0, 0, 0, 0.12);
        }

        .login-card h2 {
            font-size: 1.85rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .login-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
            font-family: inherit;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            font-family: inherit;
            box-shadow: var(--shadow-sm);
        }

        .login-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>后台登录</h2>
        <div class="input-group">
            <label class="input-label">账号</label>
            <input type="text" id="adminName" class="input-field" placeholder="请输入账号" autocomplete="off">
        </div>
        <div class="input-group">
            <label class="input-label">密码</label>
            <input type="password" id="adminPwd" class="input-field" placeholder="请输入密码">
        </div>
        <button id="loginBtn" class="login-btn">登录</button>
    </div>

    <script>
        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if (toast) toast.remove();
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        document.getElementById('loginBtn').onclick = async () => {
            const admin = document.getElementById('adminName').value.trim();
            const password = document.getElementById('adminPwd').value;
            if (!admin || !password) {
                showToast('请输入账号和密码');
                return;
            }
            const formData = new URLSearchParams();
            formData.append('type', 'login');
            formData.append('admin', admin);
            formData.append('password', password);
            try {
                const res = await fetch('./core/post.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();
                if (data.code === 200) {
                    window.location.href = 'index.php?action=admin&type=API';
                } else {
                    showToast(data.msg || '登录失败');
                }
            } catch (e) {
                showToast('网络错误');
            }
        };

        document.getElementById('adminPwd').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
