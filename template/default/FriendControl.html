<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>友链管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f6f8fc;
            font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            color: #0f172a;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-page: #f6f8fc;
            --card-bg: #ffffff;
            --text-main: #0a0f1c;
            --text-muted: #4b5569;
            --text-placeholder: #94a3b8;
            --border-light: #eef2f8;
            --border-strong: #e2e8f0;
            --accent: #2463eb;
            --accent-hover: #1a4fbf;
            --accent-soft: rgba(36, 99, 235, 0.08);
            --danger: #e5484d;
            --danger-hover: #cc3b40;
            --danger-soft: rgba(229, 72, 77, 0.06);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 12px 24px -8px rgba(0, 0, 0, 0.08);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 12px;
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #0c111b;
                --card-bg: #131a26;
                --text-main: #edf2f7;
                --text-muted: #9aa9bf;
                --text-placeholder: #4f5b6b;
                --border-light: #1f2a3a;
                --border-strong: #2d3848;
                --accent: #3b82f6;
                --accent-hover: #5b9eff;
                --accent-soft: rgba(59, 130, 246, 0.12);
            }
        }

        body {
            background: var(--bg-page);
        }

        /* 顶部导航 */
        .app-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 30;
        }
        .nav-container {
            max-width: 1360px;
            margin: 0 auto;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: -0.3px;
            background: var(--accent-soft);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .dropdown {
            position: relative;
        }
        .menu-trigger {
            background: var(--card-bg);
            border: 1px solid var(--border-strong);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: var(--shadow-xs);
        }
        .menu-trigger:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
        }
        .dropdown-arrow {
            font-size: 11px;
            opacity: 0.7;
        }
        .dropdown-panel {
            position: absolute;
            top: 46px;
            left: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transition: 0.15s;
            z-index: 40;
            overflow: hidden;
        }
        .dropdown-panel.open {
            opacity: 1;
            visibility: visible;
        }
        .dropdown-panel a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 0.85rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .dropdown-panel a:last-child {
            border-bottom: none;
        }
        .dropdown-panel a:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .logout-button {
            background: transparent;
            border: 1px solid var(--border-strong);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }
        .logout-button:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-soft);
        }

        /* 主内容区 */
        .main-content {
            max-width: 1360px;
            margin: 32px auto;
            padding: 0 28px;
        }

        /* 友链表格卡片 */
        .data-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }
        .friend-table {
            width: 100%;
            border-collapse: collapse;
        }
        .friend-table th {
            text-align: left;
            padding: 16px 20px;
            background: var(--bg-page);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-light);
        }
        .friend-table td {
            padding: 16px 20px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-main);
            vertical-align: middle;
        }
        .friend-table tr:last-child td {
            border-bottom: none;
        }
        .friend-table tr:hover td {
            background: var(--accent-soft);
        }

        .friend-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .friend-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .friend-url {
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            word-break: break-all;
            max-width: 280px;
            display: inline-block;
        }
        .friend-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-chip {
            background: var(--card-bg);
            border: 1px solid var(--border-strong);
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }
        .action-chip.delete:hover {
            background: var(--danger-soft);
            border-color: var(--danger);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-placeholder);
            font-size: 0.9rem;
        }

        /* 分页组件 */
        .pagination-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
            align-items: center;
        }
        .page-item {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }
        .page-item.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .page-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .page-item:not(.disabled):hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* FAB 按钮 */
        .fab-add {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 26px;
            font-weight: 400;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 45;
        }
        .fab-add:hover {
            background: var(--accent-hover);
            transform: scale(1.03);
            box-shadow: 0 12px 28px rgba(36, 99, 235, 0.25);
        }

        /* 模态框 - 仅添加 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal-mask.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: var(--card-bg);
            width: 520px;
            max-width: 92vw;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 26px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
            font-size: 1.1rem;
        }
        .modal-body {
            padding: 24px 26px;
        }
        .field-group {
            margin-bottom: 20px;
        }
        .field-group label {
            font-size: 0.8rem;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .field-group input, .field-group textarea {
            width: 100%;
            background: var(--bg-page);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 0.85rem;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
            outline: none;
        }
        .field-group input:focus, .field-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .modal-footer {
            padding: 18px 26px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-modal {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid var(--border-strong);
            background: var(--card-bg);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary-modal {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .btn-primary-modal:hover {
            background: var(--accent-hover);
        }
        .toast-feedback {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937dd;
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 26px;
            border-radius: 100px;
            font-size: 0.8rem;
            z-index: 300;
            font-weight: 500;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .nav-container { padding: 10px 20px; }
            .main-content { padding: 0 20px; }
            .friend-table th, .friend-table td { padding: 12px 14px; }
            .friend-url { max-width: 160px; font-size: 0.7rem; }
            .friend-desc { max-width: 140px; white-space: normal; }
        }
    </style>
</head>
<body>
<div class="app-bar">
    <div class="nav-container">
        <div class="logo-area">🔗 友链管理</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="dropdown">
                <button class="menu-trigger" id="navDropdownBtn">
                    后台菜单
                    <span class="dropdown-arrow">⌵</span>
                </button>
                <div class="dropdown-panel" id="navDropdownPanel">
                    <a href="index.php?action=admin&type=API">API管理</a>
                    <a href="index.php?action=admin&type=friend">友链管理</a>
                    <a href="index.php?action=admin&type=set">站点配置</a>
                </div>
            </div>
            <button class="logout-button" id="logoutBtn">退出登录</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="tableWrapper">加载中...</div>
    <div id="paginationWrapper"></div>
</div>

<button class="fab-add" id="createFab">+</button>

<script>
    // ---------- 全局状态 ----------
    let friendList = [];
    let currentPage = 1;
    const pageSize = 10;

    // ---------- 后端通信 ----------
    async function callPostApi(payload) {
        const formBody = new URLSearchParams();
        for (const [key, val] of Object.entries(payload)) {
            if (val !== undefined && val !== null) formBody.append(key, val);
        }
        const response = await fetch('./core/post.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formBody.toString()
        });
        return await response.json();
    }

    function showMessage(msg, isError = false) {
        let existing = document.querySelector('.toast-feedback');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-feedback';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- 渲染表格：图标/站点名称/链接/描述 + 仅删除按钮 ----------
    function renderFriendTable(items, page, pageSizeVal) {
        const start = (page - 1) * pageSizeVal;
        const pageItems = items.slice(start, start + pageSizeVal);
        const isEmpty = items.length === 0;

        if (isEmpty) {
            return `
                <div class="data-card">
                    <div class="empty-state">
                        🌱 暂无友情链接<br>点击右下角「+」添加伙伴站点
                    </div>
                </div>
            `;
        }

        let rows = '';
        pageItems.forEach((item) => {
            const safeTitle = escapeHtml(item.title || '未命名');
            const safeDesc = escapeHtml(item.desc || '');
            const safeUrl = escapeHtml(item.url || '#');
            const safeImage = escapeHtml(item.image || '');
            const imageHtml = safeImage ? `<img src="${safeImage}" class="friend-avatar" alt="icon" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2244%22%20height%3D%2244%22%20viewBox%3D%220%200%2044%2044%22%3E%3Crect%20width%3D%2244%22%20height%3D%2244%22%20fill%3D%22%23e2e8f0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%2394a3b8%22%3E🔗%3C%2Ftext%3E%3C%2Fsvg%3E'">` : `<div class="friend-avatar" style="display: flex; align-items: center; justify-content: center; background: var(--bg-page); color: var(--text-placeholder); font-size: 20px;">🌐</div>`;
            
            rows += `
                <tr>
                    <td style="width: 70px;">${imageHtml}</td>
                    <td><div class="friend-name">${safeTitle}</div></td>
                    <td><span class="friend-url">${safeUrl}</span></td>
                    <td><div class="friend-desc" title="${safeDesc}">${safeDesc}</div></td>
                    <td style="width: 80px;">
                        <div class="action-group">
                            <button class="action-chip delete" data-title="${safeTitle}">删除</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        return `
            <div class="data-card">
                <table class="friend-table">
                    <thead>
                        <tr><th style="width:70px">图标</th><th>站点名称</th><th>链接地址</th><th>描述</th><th style="width:80px">操作</th></tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>
        `;
    }

    // 分页控件
    function renderPaginationControls(totalItems, current, pageSizeVal) {
        const totalPages = Math.ceil(totalItems / pageSizeVal);
        if (totalPages <= 1) return '';
        let html = `<div class="pagination-bar">`;
        html += `<button class="page-item ${current === 1 ? 'disabled' : ''}" id="prevPageBtn">← 上一页</button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-item ${i === current ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="page-item ${current === totalPages ? 'disabled' : ''}" id="nextPageBtn">下一页 →</button>`;
        html += `</div>`;
        return html;
    }

    // 刷新整个视图
    function refreshUI() {
        const tableHtml = renderFriendTable(friendList, currentPage, pageSize);
        const paginationHtml = renderPaginationControls(friendList.length, currentPage, pageSize);
        document.getElementById('tableWrapper').innerHTML = tableHtml;
        document.getElementById('paginationWrapper').innerHTML = paginationHtml;
        bindDeleteEvents();
        bindPaginationEvents();
    }

    // 加载数据
    async function loadFriendData() {
        const res = await callPostApi({ type: 'getFriend' });
        if (res.code === 200) {
            friendList = res.data || [];
            const maxPage = Math.ceil(friendList.length / pageSize) || 1;
            if (currentPage > maxPage) currentPage = maxPage;
            refreshUI();
        } else {
            document.getElementById('tableWrapper').innerHTML = `<div class="data-card"><div class="empty-state">❌ 加载失败: ${res.msg || '请检查后端'}</div></div>`;
            document.getElementById('paginationWrapper').innerHTML = '';
        }
    }

    // 绑定删除事件（仅删除）
    function bindDeleteEvents() {
        document.querySelectorAll('.action-chip.delete').forEach(btn => {
            // 移除旧事件避免重复绑定
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }

    async function handleDelete(e) {
        const btn = e.currentTarget;
        const title = btn.getAttribute('data-title');
        if (!title) return;
        if (!confirm(`确定要删除友链「${title}」吗？`)) return;
        const res = await callPostApi({ type: 'delFriend', title: title });
        if (res.code === 200) {
            showMessage('删除成功');
            await loadFriendData();
        } else {
            showMessage(res.msg || '删除失败', true);
        }
    }

    function bindPaginationEvents() {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const totalPages = Math.ceil(friendList.length / pageSize);
        if (prevBtn) {
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    refreshUI();
                }
            };
        }
        if (nextBtn) {
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    refreshUI();
                }
            };
        }
        document.querySelectorAll('.page-item[data-page]').forEach(btn => {
            btn.onclick = () => {
                const page = parseInt(btn.getAttribute('data-page'));
                if (!isNaN(page) && page !== currentPage) {
                    currentPage = page;
                    refreshUI();
                }
            };
        });
    }

    // ------------------ 模态框 (仅添加) ------------------
    function openAddModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-container">
                <div class="modal-header">➕ 添加友链</div>
                <div class="modal-body">
                    <div class="field-group"><label>站点名称 *</label><input id="friendTitle" placeholder="例如：小明博客" value=""></div>
                    <div class="field-group"><label>描述 *</label><textarea id="friendDesc" rows="2" placeholder="简短介绍..."></textarea></div>
                    <div class="field-group"><label>图标地址 (URL)</label><input id="friendImage" placeholder="https://example.com/icon.png" value=""></div>
                    <div class="field-group"><label>链接 *</label><input id="friendUrl" placeholder="https://" value=""></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal" id="cancelModalBtn">取消</button>
                    <button class="btn-modal btn-primary-modal" id="confirmModalBtn">创建</button>
                </div>
            </div>
        `;

        document.body.appendChild(modalDiv);
        modalDiv.classList.add('active');

        const closeModal = () => modalDiv.remove();
        document.getElementById('cancelModalBtn').onclick = closeModal;

        document.getElementById('confirmModalBtn').onclick = async () => {
            const title = document.getElementById('friendTitle').value.trim();
            const desc = document.getElementById('friendDesc').value.trim();
            const image = document.getElementById('friendImage').value.trim();
            const url = document.getElementById('friendUrl').value.trim();

            if (!title || !desc || !url) {
                showMessage('请完整填写站点名称、描述和链接地址', true);
                return;
            }

            const res = await callPostApi({
                type: 'addFriend',
                title: title,
                desc: desc,
                image: image,
                url: url
            });

            if (res.code === 200) {
                showMessage('添加成功');
                closeModal();
                currentPage = 1;
                await loadFriendData();
            } else {
                showMessage(res.msg || '操作失败，可能标题重复', true);
            }
        };
    }

    // ---------- 页面初始化与事件绑定 ----------
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await callPostApi({ type: 'clear' });
        window.location.href = 'index.php?action=admin&type=login';
    });

    // 下拉菜单逻辑
    const dropBtn = document.getElementById('navDropdownBtn');
    const dropPanel = document.getElementById('navDropdownPanel');
    if (dropBtn && dropPanel) {
        dropBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropPanel.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!dropBtn.contains(e.target) && !dropPanel.contains(e.target)) {
                dropPanel.classList.remove('open');
            }
        });
    }

    document.getElementById('createFab')?.addEventListener('click', () => openAddModal());

    // 启动应用
    loadFriendData();
</script>
