<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>友链管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); pointer-events: none; z-index: -1;
        }

        /* 顶部导航 */
        .app-bar {
            background: rgba(255, 255, 255, 0.12);
            border-bottom: 2px solid rgba(255, 255, 255, 0.18);
            position: sticky; top: 0; z-index: 30;
            backdrop-filter: blur(12px); border-radius: 15px; margin-bottom: 24px;
        }
        .nav-container {
            max-width: 1600px; margin: 0 auto; padding: 14px 28px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-area {
            font-weight: 600; font-size: 1rem; color: white;
            letter-spacing: -0.3px; background: rgba(255, 255, 255, 0.15);
            padding: 6px 18px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dropdown { position: relative; }
        .menu-trigger {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px; border-radius: 40px; font-size: 0.85rem;
            font-weight: 500; color: white; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .menu-trigger:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); }
        .dropdown-arrow { font-size: 11px; opacity: 0.7; }
        .dropdown-panel {
            position: absolute; top: 46px; left: 0;
            background: rgba(20, 20, 45, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 170px; opacity: 0; visibility: hidden; transition: 0.15s;
            z-index: 40; overflow: hidden; backdrop-filter: blur(12px);
        }
        .dropdown-panel.open { opacity: 1; visibility: visible; }
        .dropdown-panel a {
            display: block; padding: 12px 20px; text-decoration: none;
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s;
        }
        .dropdown-panel a:last-child { border-bottom: none; }
        .dropdown-panel a:hover { background: rgba(255, 255, 255, 0.1); }
        .logout-button {
            background: transparent; border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px; border-radius: 40px; font-size: 0.8rem;
            font-weight: 500; color: rgba(255, 255, 255, 0.75);
            cursor: pointer; transition: all 0.2s;
        }
        .logout-button:hover { border-color: #f87171; color: #fca5a5; background: rgba(248, 113, 113, 0.15); }

        .main-content { max-width: 1600px; margin: 32px auto; padding: 0 28px; }

        /* 表格卡片 */
        .data-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.18);
            overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(12px); transition: all 0.2s;
        }
        .friend-table { width: 100%; border-collapse: collapse; }
        .friend-table th {
            text-align: left; padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08); font-size: 0.78rem;
            font-weight: 600; color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.3px; border-bottom: 1.5px solid rgba(255, 255, 255, 0.12);
        }
        .friend-table td {
            padding: 15px 20px; font-size: 0.83rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.92); vertical-align: middle;
        }
        .friend-table tr:last-child td { border-bottom: none; }
        .friend-table tr:hover td { background: rgba(255, 255, 255, 0.08); }

        .friend-avatar {
            width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
            background: rgba(255, 255, 255, 0.1); border: 1.5px solid rgba(255, 255, 255, 0.2);
        }
        .friend-name { font-weight: 600; font-size: 0.87rem; color: white; }
        .friend-url {
            font-family: 'SF Mono', monospace; font-size: 0.73rem; color: #93c5fd;
            word-break: break-all; max-width: 280px; display: inline-block;
        }
        .friend-desc {
            font-size: 0.79rem; color: rgba(255, 255, 255, 0.65);
            max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .action-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px; border-radius: 32px; font-size: 0.7rem;
            font-weight: 500; cursor: pointer; transition: all 0.2s;
            color: rgba(255, 255, 255, 0.75);
        }
        .action-chip.delete:hover {
            background: rgba(248, 113, 113, 0.2); border-color: #f87171; color: #fca5a5;
        }

        .empty-state { text-align: center; padding: 70px 20px; color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }

        .pagination-bar { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; align-items: center; }
        .page-item {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            padding: 8px 15px; border-radius: 40px; font-size: 0.74rem;
            font-weight: 500; cursor: pointer; transition: all 0.2s;
            color: rgba(255, 255, 255, 0.7);
        }
        .page-item.active { background: rgba(99, 102, 241, 0.7); border-color: #818cf8; color: white; }
        .page-item.disabled { opacity: 0.35; pointer-events: none; }
        .page-item:not(.disabled):hover {
            background: rgba(255, 255, 255, 0.22); border-color: rgba(255, 255, 255, 0.35); color: white;
        }

        .fab-add {
            position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px;
            background: rgba(99, 102, 241, 0.7); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px; color: white; font-size: 26px; font-weight: 400;
            cursor: pointer; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
            z-index: 45; backdrop-filter: blur(10px);
        }
        .fab-add:hover { background: rgba(99, 102, 241, 0.9); transform: scale(1.05); }

        /* 模态框 */
        .modal-mask {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px); display: flex; align-items: center;
            justify-content: center; z-index: 200; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .modal-mask.active { opacity: 1; visibility: visible; }
        .modal-container {
            background: rgba(20, 20, 45, 0.95); width: 520px; max-width: 92vw;
            border-radius: 20px; border: 1.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .modal-header {
            padding: 20px 26px; border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            font-weight: 600; font-size: 1.05rem; color: white;
        }
        .modal-body { padding: 24px 26px; }
        .field-group { margin-bottom: 20px; }
        .field-group label {
            font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.65);
        }
        .field-group input, .field-group textarea {
            width: 100%; background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px; padding: 12px 14px; font-size: 0.84rem;
            color: white; font-family: inherit; transition: all 0.2s; outline: none;
        }
        .field-group input::placeholder,
        .field-group textarea::placeholder { color: rgba(255, 255, 255, 0.35); }
        .field-group input:focus, .field-group textarea:focus {
            border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
            background: rgba(255, 255, 255, 0.14);
        }
        .modal-footer {
            padding: 18px 26px; border-top: 1.5px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: flex-end; gap: 12px;
        }
        .btn-modal {
            padding: 10px 24px; border-radius: 40px; font-size: 0.8rem;
            font-weight: 500; border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1); cursor: pointer; transition: all 0.2s;
            color: rgba(255, 255, 255, 0.85);
        }
        .btn-primary-modal { background: rgba(99, 102, 241, 0.7); border-color: #818cf8; color: white; }
        .btn-primary-modal:hover { background: rgba(99, 102, 241, 0.9); }
        .toast-feedback {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 60, 0.9); backdrop-filter: blur(12px);
            color: white; padding: 10px 26px; border-radius: 100px; font-size: 0.8rem;
            z-index: 300; font-weight: 500; pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 900px) {
            .nav-container { padding: 10px 20px; }
            .main-content { padding: 0 16px; }
            .friend-table th, .friend-table td { padding: 11px 13px; }
            .friend-url { max-width: 160px; font-size: 0.68rem; }
            .friend-desc { max-width: 120px; white-space: normal; }
        }
    </style>
</head>
<body>
<div class="app-bar">
    <div class="nav-container">
        <div class="logo-area">&#128279; 友链管理</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="dropdown">
                <button class="menu-trigger" id="navDropdownBtn">
                    后台菜单
                    <span class="dropdown-arrow">&#8964;</span>
                </button>
                <div class="dropdown-panel" id="navDropdownPanel">
                    <a href="index.php?action=admin&type=API">API管理</a>
                    <a href="index.php?action=admin&type=friend">友链管理</a>
                    <a href="index.php?action=admin&type=set">站点配置</a>
                </div>
            </div>
            <button class="logout-button" id="logoutBtn">退出登录</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="tableWrapper">加载中...</div>
    <div id="paginationWrapper"></div>
</div>

<button class="fab-add" id="createFab">+</button>

<script>
    let friendList = []; let currentPage = 1; const pageSize = 10;

    async function callPostApi(payload) {
        const formBody = new URLSearchParams();
        for (const [key, val] of Object.entries(payload)) { if (val !== undefined && val !== null) formBody.append(key, val); }
        const response = await fetch('./core/post.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody.toString() });
        return await response.json();
    }

    function showMessage(msg, isError = false) {
        let existing = document.querySelector('.toast-feedback'); if (existing) existing.remove();
        const toast = document.createElement('div'); toast.className = 'toast-feedback'; toast.innerText = msg;
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 2200);
    }

    function escapeHtml(str) {
        if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m; });
    }

    function renderFriendTable(items, page, pageSizeVal) {
        const start = (page - 1) * pageSizeVal; const pageItems = items.slice(start, start + pageSizeVal); const isEmpty = items.length === 0;
        if (isEmpty) return `<div class="data-card"><div class="empty-state">&#127807; 暂无友情链接<br>点击右下角「+」添加伙伴站点</div></div>`;
        let rows = ''; pageItems.forEach((item) => {
            const safeTitle = escapeHtml(item.title || '未命名'); const safeDesc = escapeHtml(item.desc || '');
            const safeUrl = escapeHtml(item.url || '#'); const safeImage = escapeHtml(item.image || '');
            const imageHtml = safeImage ? `<img src="${safeImage}" class="friend-avatar" alt="icon" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2244%22%20height%3D%2244%22%20viewBox%3D%220%200%2044%2044%22%3E%3Crect%20width%3D%2244%22%20height%3D%2244%22%20fill%3D%22rgba(255,255,255,0.12)%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22rgba(255,255,255,0.5)%22%3E&#128279;%3C%2Ftext%3E%3C%2Fsvg%3E'">` : `<div class="friend-avatar" style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:20px;border:1.5px solid rgba(255,255,255,0.2);">&#127760;</div>`;
            rows += `<tr><td style="width:70px">${imageHtml}</td><td><div class="friend-name">${safeTitle}</div></td><td><span class="friend-url">${safeUrl}</span></td><td><div class="friend-desc" title="${safeDesc}">${safeDesc}</div></td><td style="width:80px"><div class="action-group"><button class="action-chip delete" data-title="${safeTitle}">删除</button></div></td></tr>`;
        });
        return `<div class="data-card"><table class="friend-table"><thead><tr><th style="width:70px">图标</th><th>站点名称</th><th>链接地址</th><th>描述</th><th style="width:80px">操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function renderPaginationControls(totalItems, current, pageSizeVal) {
        const totalPages = Math.ceil(totalItems / pageSizeVal); if (totalPages <= 1) return '';
        let html = `<div class="pagination-bar">`;
        html += `<button class="page-item ${current===1?'disabled':''}" id="prevPageBtn">&larr; 上一页</button>`;
        for(let i=1;i<=totalPages;i++) html+=`<button class="page-item ${i===current?'active':''}" data-page="${i}">${i}</button>`;
        html += `<button class="page-item ${current===totalPages?'disabled':''}" id="nextPageBtn">下一页 &rarr;</button>`;
        return html + `</div>`;
    }

    function refreshUI() {
        document.getElementById('tableWrapper').innerHTML = renderFriendTable(friendList, currentPage, pageSize);
        document.getElementById('paginationWrapper').innerHTML = renderPaginationControls(friendList.length, currentPage, pageSize);
        bindDeleteEvents(); bindPaginationEvents();
    }

    async function loadFriendData() {
        const res = await callPostApi({type:'getFriend'});
        if(res.code===200){ friendList=res.data||[]; const maxPage=Math.ceil(friendList.length/pageSize)||1; if(currentPage>maxPage)currentPage=maxPage; refreshUI(); }
        else{ document.getElementById('tableWrapper').innerHTML=`<div class="data-card"><div class="empty-state">&#10060; 加载失败: ${res.msg||'请检查后端'}</div></div>`; document.getElementById('paginationWrapper').innerHTML=''; }
    }

    function bindDeleteEvents() {
        document.querySelectorAll('.action-chip.delete').forEach(btn=>{ btn.removeEventListener('click',handleDelete); btn.addEventListener('click',handleDelete); });
    }

    async function handleDelete(e){ const btn=e.currentTarget;const title=btn.getAttribute('data-title');if(!title)return;if(!confirm(`确定要删除友链「${title}」吗？`))return;const res=await callPostApi({type:'delFriend',title:title});if(res.code===200){showMessage('删除成功');await loadFriendData();}else{showMessage(res.msg||'删除失败',true);} }

    function bindPaginationEvents(){
        const pb=document.getElementById('prevPageBtn'),nb=document.getElementById('nextPageBtn'),tp=Math.ceil(friendList.length/pageSize);
        if(pb)pb.onclick=()=>{if(currentPage>1){currentPage--;refreshUI();}};
        if(nb)nb.onclick=()=>{if(currentPage<tp){currentPage++;refreshUI();}};
        document.querySelectorAll('.page-item[data-page]').forEach(b=>{b.onclick=()=>{const p=parseInt(b.getAttribute('data-page'));if(!isNaN(p)&&p!==currentPage){currentPage=p;refreshUI();}}});
    }

    function openAddModal(){
        const m=document.createElement('div');m.className='modal-mask';
        m.innerHTML=`<div class="modal-container"><div class="modal-header">&#10133; 添加友链</div><div class="modal-body"><div class="field-group"><label>站点名称 *</label><input id="friendTitle" placeholder="例如：小明博客" value=""></div><div class="field-group"><label>描述 *</label><textarea id="friendDesc" rows="2" placeholder="简短介绍..."></textarea></div><div class="field-group"><label>图标地址 (URL)</label><input id="friendImage" placeholder="https://example.com/icon.png" value=""></div><div class="field-group"><label>链接 *</label><input id="friendUrl" placeholder="https://" value=""></div></div><div class="modal-footer"><button class="btn-modal" id="cancelModalBtn">取消</button><button class="btn-modal btn-primary-modal" id="confirmModalBtn">创建</button></div></div>`;
        document.body.appendChild(m);m.classList.add('active');
        const close=()=>m.remove();document.getElementById('cancelModalBtn').onclick=close;
        document.getElementById('confirmModalBtn').onclick=async()=>{
            const t=document.getElementById('friendTitle').value.trim(),d=document.getElementById('friendDesc').value.trim(),im=document.getElementById('friendImage').value.trim(),u=document.getElementById('friendUrl').value.trim();
            if(!t||!d||!u){showMessage('请完整填写站点名称、描述和链接地址',true);return;}
            const r=await callPostApi({type:'addFriend',title:t,desc:d,image:im,url:u});
            if(r.code===200){showMessage('添加成功');close();currentPage=1;await loadFriendData();}
            else{showMessage(r.msg||'操作失败，可能标题重复',true);}
        };
    }

    document.getElementById('logoutBtn')?.addEventListener('click',async()=>{await callPostApi({type:'clear'});window.location.href='index.php?action=admin&type=login';});
    const db=document.getElementById('navDropdownBtn'),dp=document.getElementById('navDropdownPanel');
    if(db&&dp){db.addEventListener('click',e=>{e.stopPropagation();dp.classList.toggle('open');});document.addEventListener('click',e=>{if(!db.contains(e.target)&&!dp.contains(e.target))dp.classList.remove('open');});}
    document.getElementById('createFab')?.addEventListener('click',()=>openAddModal());loadFriendData();
</script>
</body>
</html>
