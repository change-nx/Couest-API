<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>站点配置 · 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('http://cnmb.xiaoyaxiao.xin/api/xihuandetupian/图片/4.jpg') center/cover no-repeat fixed;
            background-color: #667eea; min-height: 100vh; padding: 20px; color: white;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); pointer-events: none; z-index: -1;
        }

        .app-bar {
            background: rgba(255, 255, 255, 0.12);
            border-bottom: 2px solid rgba(255, 255, 255, 0.18);
            position: sticky; top: 0; z-index: 25;
            backdrop-filter: blur(12px); border-radius: 15px; margin-bottom: 24px;
        }
        .nav-container {
            max-width: 1600px; margin: 0 auto; padding: 14px 28px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-area {
            font-weight: 600; font-size: 1rem; color: white;
            letter-spacing: -0.3px; background: rgba(255, 255, 255, 0.15);
            padding: 6px 18px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dropdown { position: relative; }
        .menu-trigger {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px; border-radius: 40px; font-size: 0.85rem;
            font-weight: 500; color: white; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .menu-trigger:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); }
        .dropdown-arrow { font-size: 11px; opacity: 0.7; }
        .dropdown-panel {
            position: absolute; top: 46px; left: 0;
            background: rgba(20, 20, 45, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 170px; opacity: 0; visibility: hidden; transition: 0.15s;
            z-index: 40; overflow: hidden; backdrop-filter: blur(12px);
        }
        .dropdown-panel.open { opacity: 1; visibility: visible; }
        .dropdown-panel a {
            display: block; padding: 12px 20px; text-decoration: none;
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s;
        }
        .dropdown-panel a:last-child { border-bottom: none; }
        .dropdown-panel a:hover { background: rgba(255, 255, 255, 0.1); }
        .logout-button {
            background: transparent; border: 1.5px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px; border-radius: 40px; font-size: 0.8rem;
            font-weight: 500; color: rgba(255, 255, 255, 0.75);
            cursor: pointer; transition: all 0.2s;
        }
        .logout-button:hover { border-color: #f87171; color: #fca5a5; background: rgba(248, 113, 113, 0.15); }

        .main-content { max-width: 800px; margin: 36px auto; padding: 0 24px; }

        .config-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 18px; border: 2px solid rgba(255, 255, 255, 0.18);
            padding: 28px 32px; margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(12px); transition: all 0.2s;
        }
        .config-card:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18); }
        .card-header {
            font-size: 1rem; font-weight: 600; margin-bottom: 24px;
            padding-bottom: 14px; border-bottom: 1.5px solid rgba(255, 255, 255, 0.12);
            display: flex; align-items: center; gap: 8px; color: white;
        }

        .form-row { margin-bottom: 22px; }
        .form-row label {
            display: block; font-size: 0.8rem; font-weight: 500;
            margin-bottom: 8px; color: rgba(255, 255, 255, 0.65);
        }
        .form-row input, .form-row textarea, .form-row select {
            width: 100%; padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px; font-size: 0.84rem; color: white;
            font-family: inherit; transition: all 0.2s; outline: none;
        }
        .form-row input::placeholder,
        .form-row textarea::placeholder { color: rgba(255, 255, 255, 0.35); }
        .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
            border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
            background: rgba(255, 255, 255, 0.14);
        }
        .form-row textarea { resize: vertical; min-height: 70px; }
        .form-row select option { background: #1a1a3e; color: white; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-save {
            margin-top: 12px; padding: 12px 28px;
            background: rgba(99, 102, 241, 0.7); border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px; font-size: 0.85rem; font-weight: 600; color: white;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15); backdrop-filter: blur(8px);
        }
        .btn-save:hover { background: rgba(99, 102, 241, 0.9); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.25); color: rgba(255, 255, 255, 0.85);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); border-color: #818cf8; color: #93c5fd; }
        .toast-feedback {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 60, 0.9); backdrop-filter: blur(12px);
            color: white; padding: 10px 26px; border-radius: 100px; font-size: 0.8rem;
            z-index: 300; font-weight: 500; pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 640px) { .main-content { padding: 0 16px; } .config-card { padding: 20px; } .two-columns { grid-template-columns: 1fr; gap: 16px; } }
    </style>
</head>
<body>
<div class="app-bar">
    <div class="nav-container">
        <div class="logo-area">&#128196; 站点配置</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="dropdown">
                <button class="menu-trigger" id="navDropdownBtn">
                    后台菜单
                    <span class="dropdown-arrow">&#8964;</span>
                </button>
                <div class="dropdown-panel" id="navDropdownPanel">
                    <a href="index.php?action=admin&type=API">API管理</a>
                    <a href="index.php?action=admin&type=friend">友链管理</a>
                    <a href="index.php?action=admin&type=set">站点配置</a>
                </div>
            </div>
            <button class="logout-button" id="logoutBtn">退出登录</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="config-card">
        <div class="card-header">&#128196; 配置信息</div>
        
        <div class="form-row"><label>网站标题</label><input type="text" id="siteTitle" placeholder="例如：API 导航站"></div>
        <div class="form-row"><label>站点描述</label><textarea id="siteDesc" rows="2" placeholder="简洁优雅的 API 集合"></textarea></div>
        <div class="two-columns">
            <div class="form-row"><label>站点域名</label><input type="text" id="siteDomain" placeholder="https://example.com"></div>
            <div class="form-row"><label>Favicon 图标</label><input type="text" id="siteFavicon" placeholder="https://example.com/favicon.ico"></div>
        </div>
        <div class="form-row"><label>官方群 / 底部链接</label><input type="text" id="siteLink" placeholder="https://qm.qq.com/..."></div>
        <div class="form-row"><label>模板主题</label><select id="siteTemplate"></select></div>
        <button class="btn-save" id="saveConfigBtn">&#128190; 保存配置</button>
    </div>

    <div class="config-card">
        <div class="card-header">&#128274; 管理员账户</div>
        <div class="two-columns">
            <div class="form-row"><label>新用户名</label><input type="text" id="adminUser" placeholder="输入新用户名"></div>
            <div class="form-row"><label>新密码</label><input type="password" id="adminPass" placeholder="输入新密码"></div>
        </div>
        <button class="btn-save" id="saveAdminBtn">&#128100; 保存账密</button>
        <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 12px;">&#9889; 用户名和密码将同时更新</div>
    </div>
</div>

<script>
    async function callPostApi(payload){
        const f=new URLSearchParams();for(const[k,v]of Object.entries(payload)){if(v!==undefined&&v!==null)f.append(k,v);}
        const r=await fetch('./core/post.php',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:f.toString()});
        return await r.json();
    }
    function showMessage(msg,isError=false){let e=document.querySelector('.toast-feedback');if(e)e.remove();const d=document.createElement('div');d.className='toast-feedback';d.innerText=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2400);}

    async function loadAllConfig(){
        const r=await callPostApi({type:'getConfig'});
        if(r.code===200&&r.data){const d=r.data;
            document.getElementById('siteTitle').value=d.title||'';
            document.getElementById('siteDesc').value=d.desc||'';
            document.getElementById('siteDomain').value=d.domain||'';
            document.getElementById('siteFavicon').value=d.favicon||'';
            document.getElementById('siteLink').value=d.link||'';
            const tl=(d.template_list&&d.template_list.length)?d.template_list:['default'];
            const s=document.getElementById('siteTemplate');s.innerHTML='';
            tl.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===(d.template||'default'))o.selected=true;s.appendChild(o);});
        }else{showMessage('加载配置失败',true);}
    }

    async function saveAllConfig(){
        const t=document.getElementById('siteTitle').value,d=document.getElementById('siteDesc').value,dom=document.getElementById('siteDomain').value,fav=document.getElementById('siteFavicon').value,lk=document.getElementById('siteLink').value,tp=document.getElementById('siteTemplate').value;
        const r=await callPostApi({type:'setConfig',title:t,desc:d,domain:dom,favicon:fav,link:lk,template:tp});
        if(r.code===200){showMessage('配置保存成功 &#10024;');await loadAllConfig();}
        else{showMessage(r.msg||'保存失败',true);}
    }

    async function saveAdminAccount(){
        const ad=document.getElementById('adminUser').value.trim(),pw=document.getElementById('adminPass').value;
        if(!ad&&!pw){showMessage('请填写用户名或密码',true);return;}
        if(!ad){showMessage('用户名不能为空',true);return;}if(!pw){showMessage('密码不能为空',true);return;}
        const r=await callPostApi({type:'setAdmin',admin:ad,password:pw});
        if(r.code===200){showMessage('账密更新成功 &#10024;');document.getElementById('adminUser').value='';document.getElementById('adminPass').value='';}
        else{showMessage(r.msg||'更新失败',true);}
    }

    document.getElementById('logoutBtn')?.addEventListener('click',async()=>{await callPostApi({type:'clear'});window.location.href='index.php?action=admin&type=login';});
    const db=document.getElementById('navDropdownBtn'),dp=document.getElementById('navDropdownPanel');
    if(db&&dp){db.addEventListener('click',e=>{e.stopPropagation();dp.classList.toggle('open');});document.addEventListener('click',e=>{if(!db.contains(e.target)&&!dp.contains(e.target))dp.classList.remove('open');});}
    document.getElementById('saveConfigBtn')?.addEventListener('click',saveAllConfig);
    document.getElementById('saveAdminBtn')?.addEventListener('click',saveAdminAccount);loadAllConfig();
</script>
</body>
</html>
