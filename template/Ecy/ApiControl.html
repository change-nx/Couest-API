<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>API 管理 · 控制台</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-bg-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-light: rgba(99, 102, 241, 0.1);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
        }

        /* 背景层 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.08;
            filter: blur(80px) saturate(1.6);
            transform: scale(1.15);
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(10, 14, 23, 0.85) 0%, 
                rgba(10, 14, 23, 0.95) 100%
            );
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--gradient-1);
            top: -200px;
            right: -200px;
            opacity: 0.12;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--gradient-2);
            bottom: -150px;
            left: -150px;
            opacity: 0.09;
            animation-delay: -12s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* 顶部导航 */
        .app-bar {
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: -0.3px;
            background: var(--accent-light);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(99, 102, 241, 0.25);
            backdrop-filter: blur(10px);
        }

        .dropdown {
            position: relative;
        }

        .menu-trigger {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 9px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .menu-trigger:hover {
            background: var(--card-bg-hover);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .dropdown-arrow {
            font-size: 11px;
            opacity: 0.7;
        }

        .dropdown-panel {
            position: absolute;
            top: 50px;
            left: 0;
            background: rgba(17, 24, 39, 0.97);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 40;
            overflow: hidden;
        }

        .dropdown-panel.open {
            opacity: 1;
            visibility: visible;
            animation: slideDown 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-panel a {
            display: block;
            padding: 13px 22px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }

        .dropdown-panel a:last-child {
            border-bottom: none;
        }

        .dropdown-panel a:hover {
            background: var(--accent-light);
            color: var(--text-primary);
            padding-left: 26px;
        }

        .logout-button {
            background: transparent;
            border: 1px solid var(--border);
            padding: 9px 20px;
            border-radius: 40px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .logout-button:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 16px var(--danger-glow);
        }

        /* 主内容区 */
        .main-content {
            max-width: 1400px;
            margin: 36px auto;
            padding: 0 28px;
        }

        /* 表格卡片 */
        .data-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 26px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .data-card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: var(--shadow), 0 0 40px var(--accent-glow);
        }

        .responsive-table {
            width: 100%;
            border-collapse: collapse;
        }

        .responsive-table th {
            text-align: left;
            padding: 17px 22px;
            background: rgba(99, 102, 241, 0.08);
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .responsive-table td {
            padding: 19px 22px;
            font-size: 0.87rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            vertical-align: middle;
        }

        .responsive-table tr:last-child td {
            border-bottom: none;
        }

        .responsive-table tbody tr {
            transition: all 0.2s ease;
        }

        .responsive-table tbody tr:hover {
            background: var(--card-bg-hover);
        }

        .id-badge {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 600;
            background: var(--accent-light);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 0.78rem;
            display: inline-block;
            color: var(--accent);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-chip {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 7px 16px;
            border-radius: 32px;
            font-size: 0.73rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--text-muted);
        }

        .action-chip.edit:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .action-chip.delete:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--danger);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--danger-glow);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 18px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 分页 */
        .pagination-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 28px;
            align-items: center;
        }

        .page-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 9px 17px;
            border-radius: 40px;
            font-size: 0.76rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-muted);
        }

        .page-item.active {
            background: var(--gradient-1);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .page-item.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .page-item:not(.disabled):not(.active):hover {
            background: var(--card-bg-hover);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        /* FAB按钮 */
        .fab-add {
            position: fixed;
            bottom: 36px;
            right: 36px;
            width: 60px;
            height: 60px;
            background: var(--gradient-1);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 8px 32px var(--accent-glow);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 45;
        }

        .fab-add:hover {
            transform: scale(1.08) rotate(90deg);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.55);
        }

        /* 模态框 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .modal-mask.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(30px);
            width: 720px;
            max-width: 94vw;
            max-height: 88vh;
            border-radius: 28px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 80px var(--accent-glow);
            overflow: hidden;
            animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, transparent 100%);
        }

        .modal-body {
            padding: 26px 28px;
            overflow-y: auto;
            flex: 1;
        }

        .field-group {
            margin-bottom: 22px;
        }

        .field-group label {
            font-size: 0.82rem;
            font-weight: 700;
            display: block;
            margin-bottom: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .field-group input, .field-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 13px 16px;
            font-size: 0.87rem;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.25s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .field-group input:focus, .field-group textarea:focus {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .param-block {
            margin-top: 30px;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 26px;
            background: rgba(0, 0, 0, 0.2);
        }

        .param-block-title {
            background: rgba(99, 102, 241, 0.08);
            padding: 14px 20px;
            font-size: 0.83rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .param-inner-table {
            width: 100%;
            border-collapse: collapse;
        }

        .param-inner-table th {
            text-align: left;
            padding: 13px 14px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .param-inner-table td {
            padding: 11px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .param-inner-table input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 9px 12px;
            font-size: 0.81rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .param-inner-table input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .remove-param-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--danger);
            opacity: 0.65;
            transition: all 0.2s ease;
            padding: 0 6px;
        }

        .remove-param-btn:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .add-param-button {
            margin: 16px 18px 18px 18px;
            background: transparent;
            border: 1.5px dashed var(--border);
            border-radius: 40px;
            padding: 9px 20px;
            font-size: 0.77rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--accent);
            display: inline-block;
        }

        .add-param-button:hover {
            background: var(--accent-light);
            border-style: solid;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .modal-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
        }

        .btn-modal {
            padding: 11px 26px;
            border-radius: 40px;
            font-size: 0.82rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-secondary);
        }

        .btn-modal:hover {
            background: var(--card-bg-hover);
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .btn-primary-modal {
            background: var(--gradient-1);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary-modal:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
        }

        .toast-feedback {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(17, 24, 39, 0.97);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 0.84rem;
            z-index: 300;
            font-weight: 600;
            pointer-events: none;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-container { padding: 12px 20px; }
            .main-content { padding: 0 20px; margin-top: 24px; }
            .responsive-table th, .responsive-table td { padding: 14px 16px; }
            .fab-add { bottom: 24px; right: 24px; width: 54px; height: 54px; font-size: 26px; }
        }
    </style>
</head>

<body>
    <!-- 背景层 -->
    <div class="background-layer">
        <img src="bg.jpg" alt="" class="bg-image" onerror="this.style.display='none'">
        <div class="bg-overlay"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <!-- 顶部导航 -->
    <div class="app-bar">
        <div class="nav-container">
            <div class="logo-area">⚡ API 管理</div>
            <div style="display: flex; gap: 14px; align-items: center;">
                <div class="dropdown">
                    <button class="menu-trigger" id="navDropdownBtn">
                        后台菜单
                        <span class="dropdown-arrow">⌵</span>
                    </button>
                    <div class="dropdown-panel" id="navDropdownPanel">
                        <a href="index.php?action=admin&type=API">API管理</a>
                        <a href="index.php?action=admin&type=friend">友链管理</a>
                        <a href="index.php?action=admin&type=set">站点配置</a>
                    </div>
                </div>
                <button class="logout-button" id="logoutBtn">退出登录</button>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div id="tableWrapper" style="min-height: 320px;">加载中...</div>
        <div id="paginationWrapper"></div>
    </div>

    <!-- FAB添加按钮 -->
    <button class="fab-add" id="createFab">+</button>

    <script>
        // ---------- 全局变量 ----------
        let globalApiList = [];
        let currentPageNum = 1;
        let rowsPerPage = 10;

        // ---------- 后端通信 ----------
        async function callBackend(payload) {
            const formData = new URLSearchParams();
            for (const [key, val] of Object.entries(payload)) {
                if (val !== undefined && val !== null) formData.append(key, val);
            }
            const response = await fetch('./core/post.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });
            return await response.json();
        }

        function showMessage(msg, isError = false) {
            let oldToast = document.querySelector('.toast-feedback');
            if (oldToast) oldToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-feedback';
            toast.innerText = (isError ? '❌ ' : '✅ ') + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ---------- 渲染表格 ----------
        function renderApiTable(apiItems, page, pageSize) {
            const start = (page - 1) * pageSize;
            const pageItems = apiItems.slice(start, start + pageSize);
            const isEmpty = apiItems.length === 0;

            if (isEmpty) {
                return `
                    <div class="data-card">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            暂无 API 接口数据<br>
                            <span style="font-size: 0.82rem; opacity: 0.7;">点击右下角「+」开始创建</span>
                        </div>
                    </div>
                `;
            }

            let rows = '';
            pageItems.forEach(item => {
                const safeId = escapeHtml(item.id || '');
                const safeTitle = escapeHtml(item.title || '未命名');
                rows += `
                    <tr>
                        <td><span class="id-badge">${safeId}</span></td>
                        <td><strong>${safeTitle}</strong></td>
                        <td style="width:140px">
                            <div class="action-group">
                                <button class="action-chip edit" data-raw='${JSON.stringify(item).replace(/'/g, "&#39;")}'>编辑</button>
                                <button class="action-chip delete" data-id="${safeId}">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            return `
                <div class="data-card">
                    <table class="responsive-table">
                        <thead>
                            <tr><th>ID</th><th>标题</th><th>操作</th></tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ---------- 分页控件 ----------
        function renderPaginationControls(totalItems, currentPage, pageSize) {
            const totalPages = Math.ceil(totalItems / pageSize);
            if (totalPages <= 1) return '';
            
            let html = `<div class="pagination-bar">`;
            html += `<button class="page-item ${currentPage === 1 ? 'disabled' : ''}" id="prevPageBtn">← 上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-item ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            
            html += `<button class="page-item ${currentPage === totalPages ? 'disabled' : ''}" id="nextPageBtn">下一页 →</button>`;
            html += `</div>`;
            return html;
        }

        // ---------- 绑定事件 ----------
        function bindTableEvents() {
            document.querySelectorAll('.action-chip.edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    try {
                        const rawJson = btn.getAttribute('data-raw');
                        const itemData = JSON.parse(rawJson);
                        openModal(itemData);
                    } catch (err) {
                        showMessage('数据解析失败', true);
                    }
                });
            });

            document.querySelectorAll('.action-chip.delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (!confirm(`确认删除 API "${id}" 吗？`)) return;
                    
                    const res = await callBackend({ type: 'delApi', id: id });
                    if (res.code === 200) {
                        showMessage('删除成功');
                        await reloadAllData();
                    } else {
                        showMessage(res.msg || '删除失败', true);
                    }
                });
            });
        }

        function bindPaginationEvents() {
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            const totalPages = Math.ceil(globalApiList.length / rowsPerPage);

            if (prevBtn) {
                prevBtn.onclick = () => {
                    if (currentPageNum > 1) {
                        currentPageNum--;
                        refreshUI();
                    }
                };
            }

            if (nextBtn) {
                nextBtn.onclick = () => {
                    if (currentPageNum < totalPages) {
                        currentPageNum++;
                        refreshUI();
                    }
                };
            }

            document.querySelectorAll('.page-item[data-page]').forEach(btn => {
                btn.onclick = () => {
                    const page = parseInt(btn.getAttribute('data-page'));
                    if (!isNaN(page) && page !== currentPageNum) {
                        currentPageNum = page;
                        refreshUI();
                    }
                };
            });
        }

        // ---------- 刷新视图 ----------
        function refreshUI() {
            const tableHtml = renderApiTable(globalApiList, currentPageNum, rowsPerPage);
            const paginationHtml = renderPaginationControls(globalApiList.length, currentPageNum, rowsPerPage);
            
            document.getElementById('tableWrapper').innerHTML = tableHtml;
            document.getElementById('paginationWrapper').innerHTML = paginationHtml;
            
            bindTableEvents();
            bindPaginationEvents();
        }

        async function reloadAllData() {
            const res = await callBackend({ type: 'getApi' });
            if (res.code === 200) {
                globalApiList = res.data || [];
                
                const maxPage = Math.ceil(globalApiList.length / rowsPerPage) || 1;
                if (currentPageNum > maxPage) currentPageNum = maxPage;
                
                refreshUI();
            } else {
                document.getElementById('tableWrapper').innerHTML = `
                    <div class="data-card">
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            加载失败: ${res.msg || '网络错误'}
                        </div>
                    </div>
                `;
                document.getElementById('paginationWrapper').innerHTML = '';
            }
        }

        // ---------- 模态框 ----------
        function openModal(editData = null) {
            const isEdit = !!(editData && editData.id);
            
            let requestParams = (editData?.request && Array.isArray(editData.request))
                ? editData.request.map(row => [row[0] || '', row[1] || '', row[2] || ''])
                : [];
            
            let responseParams = (editData?.response && Array.isArray(editData.response))
                ? editData.response.map(row => [row[0] || '', row[1] || '', row[2] || ''])
                : [];

            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal-mask';
            modalDiv.innerHTML = `
                <div class="modal-container">
                    <div class="modal-header">${isEdit ? '✏️ 编辑接口' : '➕ 新建接口'}</div>
                    <div class="modal-body">
                        <div class="field-group"><label>ID *</label><input id="apiId" placeholder="唯一标识，例如 weather_api" value="${escapeHtml(editData?.id || '')}"></div>
                        <div class="field-group"><label>标题 *</label><input id="apiTitle" value="${escapeHtml(editData?.title || '')}"></div>
                        <div class="field-group"><label>描述 *</label><textarea id="apiDesc" rows="2">${escapeHtml(editData?.desc || '')}</textarea></div>
                        <div class="field-group"><label>调用地址 *</label><input id="apiUrl" value="${escapeHtml(editData?.url || '')}"></div>
                        <div class="field-group"><label>示例地址</label><input id="apiExample" value="${escapeHtml(editData?.example || '')}"></div>
                        <div class="field-group"><label>请求方式</label><input id="apiMethod" value="${escapeHtml(editData?.method || 'GET')}"></div>
                        
                        <div class="param-block">
                            <div class="param-block-title">📤 请求参数</div>
                            <div id="requestParamsContainer"></div>
                            <button type="button" class="add-param-button" id="addReqRowBtn">+ 添加参数</button>
                        </div>

                        <div class="param-block">
                            <div class="param-block-title">📥 返回参数</div>
                            <div id="responseParamsContainer"></div>
                            <button type="button" class="add-param-button" id="addResRowBtn">+ 添加参数</button>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-modal" id="modalCancelBtn">取消</button>
                        <button class="btn-modal btn-primary-modal" id="modalConfirmBtn">${isEdit ? '保存修改' : '创建'}</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modalDiv);
            
            setTimeout(() => modalDiv.classList.add('active'), 10);

            // 渲染参数表格
            function renderParamTable(containerId, paramArray) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const render = () => {
                    let html = `<table class="param-inner-table">
                        <thead>
                            <tr><th>参数名</th><th>类型</th><th>说明</th><th style="width:42px"></th></tr>
                        </thead><tbody>`;
                    
                    paramArray.forEach((row, idx) => {
                        html += `
                            <tr data-idx="${idx}">
                                <td><input type="text" value="${escapeHtml(row[0])}" data-rowidx="${idx}" data-col="0" placeholder="name"></td>
                                <td><input type="text" value="${escapeHtml(row[1])}" data-rowidx="${idx}" data-col="1" placeholder="string/int"></td>
                                <td><input type="text" value="${escapeHtml(row[2])}" data-rowidx="${idx}" data-col="2" placeholder="说明"></td>
                                <td><button class="remove-param-btn" data-idx="${idx}">✕</button></td>
                            </tr>
                        `;
                    });
                    
                    html += `</tbody></table>`;
                    container.innerHTML = html;

                    // 绑定输入事件
                    container.querySelectorAll('input').forEach(inp => {
                        inp.addEventListener('change', (e) => {
                            const rowIdx = parseInt(inp.getAttribute('data-rowidx'));
                            const colIdx = parseInt(inp.getAttribute('data-col'));
                            if (!isNaN(rowIdx) && paramArray[rowIdx] && !isNaN(colIdx)) {
                                paramArray[rowIdx][colIdx] = inp.value;
                            }
                        });
                    });

                    // 删除按钮
                    container.querySelectorAll('.remove-param-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = parseInt(btn.getAttribute('data-idx'));
                            if (!isNaN(idx)) {
                                paramArray.splice(idx, 1);
                                render();
                            }
                        });
                    });
                };

                render();
            }

            renderParamTable('requestParamsContainer', requestParams);
            renderParamTable('responseParamsContainer', responseParams);

            // 添加参数
            document.getElementById('addReqRowBtn').onclick = () => {
                requestParams.push(['', '', '']);
                renderParamTable('requestParamsContainer', requestParams);
            };

            document.getElementById('addResRowBtn').onclick = () => {
                responseParams.push(['', '', '']);
                renderParamTable('responseParamsContainer', responseParams);
            };

            // 关闭模态框
            const closeModal = () => modalDiv.remove();
            document.getElementById('modalCancelBtn').onclick = closeModal;

            // 提交表单
            document.getElementById('modalConfirmBtn').onclick = async () => {
                const id = document.getElementById('apiId').value.trim();
                const title = document.getElementById('apiTitle').value.trim();
                const desc = document.getElementById('apiDesc').value.trim();
                const url = document.getElementById('apiUrl').value.trim();
                const example = document.getElementById('apiExample').value.trim();
                const method = document.getElementById('apiMethod').value.trim();

                if (!id || !title || !desc || !url || !method) {
                    showMessage('请完整填写必填项', true);
                    return;
                }

                const action = isEdit ? 'setApi' : 'addApi';
                const payload = {
                    type: action,
                    id, title, desc, url, example, method,
                    request: JSON.stringify(requestParams),
                    response: JSON.stringify(responseParams)
                };

                const res = await callBackend(payload);
                if (res.code === 200) {
                    showMessage(isEdit ? '更新成功' : '创建成功');
                    closeModal();
                    currentPageNum = 1;
                    await reloadAllData();
                } else {
                    showMessage(res.msg || '操作失败', true);
                }
            };
        }

        // HTML转义
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // ---------- 事件绑定与初始化 ----------
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await callBackend({ type: 'clear' });
            window.location.href = 'index.php?action=admin&type=login';
        });

        const dropBtn = document.getElementById('navDropdownBtn');
        const dropPanel = document.getElementById('navDropdownPanel');

        if (dropBtn && dropPanel) {
            dropBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropPanel.classList.toggle('open');
            });

            document.addEventListener('click', (e) => {
                if (!dropBtn.contains(e.target) && !dropPanel.contains(e.target)) {
                    dropPanel.classList.remove('open');
                }
            });
        }

        document.getElementById('createFab')?.addEventListener('click', () => openModal(null));

        // 页面启动
        (async () => {
            await reloadAllData();
        })();
    </script>
</body>
</html>
