<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-bg-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景层 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            filter: blur(60px) saturate(1.5);
            transform: scale(1.1);
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(10, 14, 23, 0.7) 0%, 
                rgba(10, 14, 23, 0.85) 50%,
                rgba(10, 14, 23, 0.95) 100%
            );
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--gradient-1);
            top: -200px;
            right: -200px;
            opacity: 0.15;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--gradient-2);
            bottom: -150px;
            left: -150px;
            opacity: 0.12;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: var(--gradient-3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* 导航栏 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(24px) saturate(180%);
            background: rgba(10, 14, 23, 0.75);
            border-bottom: 1px solid var(--border);
        }

        .nav {
            max-width: 1280px;
            margin: auto;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo img {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo img:hover {
            transform: scale(1.08) rotate(3deg);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-btn {
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            padding: 10px 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            transition: all 0.25s ease;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .dropdown {
            position: absolute;
            top: 72px;
            right: 28px;
            width: 200px;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: none;
            animation: slideDown 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown.show {
            display: block;
        }

        .dropdown a {
            display: block;
            padding: 15px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .dropdown a:last-child {
            border-bottom: none;
        }

        .dropdown a:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
            padding-left: 22px;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: auto;
            padding: 32px 28px;
        }

        /* 搜索框 */
        .search-wrapper {
            position: relative;
            margin-bottom: 32px;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
            pointer-events: none;
        }

        .search {
            width: 100%;
            border: none;
            outline: none;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            border-radius: 18px;
            padding: 18px 20px 18px 52px;
            font-size: 15px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .search:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2), var(--shadow);
        }

        .search::placeholder {
            color: var(--text-secondary);
        }

        /* API列表 */
        .api-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            background: var(--card-bg-hover);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), 0 0 40px var(--accent-glow);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:active {
            transform: translateY(-2px) scale(0.99);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .api-title {
            font-size: 19px;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-word;
            flex: 1;
            letter-spacing: -0.3px;
        }

        .stats-mini {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .stats-mini svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .api-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 14px;
            font-weight: 400;
        }

        /* 抽屉 */
        .drawer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            max-height: 88vh;
            background: rgba(17, 24, 39, 0.97);
            backdrop-filter: blur(30px);
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            overflow: auto;
            border: 1px solid var(--border);
            border-bottom: none;
            box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.6);
        }

        .drawer.show {
            transform: translateY(0);
        }

        .drawer-handle {
            width: 44px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 14px auto 20px;
        }

        .drawer-content {
            padding: 0 28px 32px;
        }

        .close {
            position: absolute;
            top: 18px;
            right: 24px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 26px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            transform: rotate(90deg);
        }

        .section {
            margin-top: 28px;
        }

        .section h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section h3 {
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .url-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 16px;
            word-break: break-all;
            border: 1px solid var(--border);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .url-box a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .url-box a:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .desc-full {
            white-space: pre-wrap;
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 14px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 13px 16px;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
        }

        td {
            color: var(--text-secondary);
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            position: relative;
            width: 92%;
            max-width: 540px;
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 26px;
            padding: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-card h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .stat-title {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            margin-top: 8px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav { padding: 14px 20px; }
            .container { padding: 24px 20px; }
            .api-list { grid-template-columns: 1fr; }
            .logo h1 { font-size: 18px; }
            .dropdown { right: 20px; width: 180px; }
            .modal-card { padding: 24px; margin: 20px; }
            .drawer-content { padding: 0 20px 28px; }
        }
    </style>
</head>

<body>

    <!-- 背景层 -->
    <div class="background-layer">
        <img src="bg.jpg" alt="" class="bg-image" onerror="this.style.display='none'">
        <div class="bg-overlay"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>

    <!-- 头部导航 -->
    <header class="header">
        <div class="nav">
            <div class="logo">
                <img id="favicon" src="" alt="Logo">
                <h1 id="siteTitle">Loading...</h1>
            </div>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="dropdown" id="menu">
                <a href="index.php?action=admin">后台管理</a>
                <a href="index.php?action=friend">友情链接</a>
                <a href="#" onclick="openGroup()">交流群组</a>
                <a href="#" onclick="showStats()">数据统计</a>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input id="search" class="search" placeholder="搜索 API 接口..." autocomplete="off">
        </div>
        <div class="api-list" id="apiList"></div>
    </div>

    <!-- 详情抽屉 -->
    <div class="drawer" id="drawer">
        <button class="close" onclick="closeDoc()">×</button>
        <div class="drawer-handle"></div>
        <div class="drawer-content" id="docContent"></div>
    </div>

    <!-- 统计模态框 -->
    <div class="modal" id="statsModal">
        <div class="modal-card">
            <button class="close" onclick="hideStats()">×</button>
            <h2>📊 数据统计</h2>
            <div class="stats" id="statsContent"></div>
        </div>
    </div>

    <script>
        let DATA = null;

        fetch("./core/api.php?type=getAllApi")
            .then(r => r.json())
            .then(res => {
                DATA = res.data;
                document.title = DATA.title;
                siteTitle.innerText = DATA.title;
                favicon.src = DATA.favicon;
                renderApis(DATA.API || []);
            });

        function formatCount(num) {
            num = Number(num) || 0;
            if (num >= 10000) return (num / 10000).toFixed(1) + "w";
            return String(num);
        }

        function renderApis(list) {
            apiList.innerHTML = "";
            list.forEach((api, index) => {
                const accessCount = formatCount(api.Access);
                
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.style.animationDelay = `${index * 0.08}s`;
                cardDiv.addEventListener('click', (e) => {
                    if (e.target.closest('.copy-link')) {
                        e.stopPropagation();
                        return;
                    }
                    showDoc(api);
                });

                cardDiv.innerHTML = `
                    <div class="card-top">
                        <div class="api-title">${escapeHtml(api.title)}</div>
                        <div class="stats-mini">
                            <svg viewBox="0 0 24 24"><path d="M12 8V12L15 15" stroke-linecap="round"/><circle cx="12" cy="12" r="9"/><path d="M12 4V2" stroke-linecap="round"/><path d="M5 5L3 3" stroke-linecap="round"/><path d="M19 5L21 3" stroke-linecap="round"/></svg>
                            ${accessCount}
                        </div>
                    </div>
                    <div class="api-desc">${escapeHtml(api.desc)}</div>
                `;

                apiList.appendChild(cardDiv);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        function buildUrl(path) {
            return DATA.domain.replace(/\/$/, '') + '/API/' + path.replace(/^\//, '');
        }

        function showDoc(api) {
            let requestRows = '';
            if (api.request && Array.isArray(api.request)) {
                api.request.forEach(i => {
                    requestRows += `<tr><td>${escapeHtml(i[0] || '')}</td><td>${escapeHtml(i[1] || '')}</td><td>${escapeHtml(i[2] || '')}</td></tr>`;
                });
            }

            let responseRows = '';
            if (api.response && Array.isArray(api.response)) {
                api.response.forEach(i => {
                    responseRows += `<tr><td>${escapeHtml(i[0] || '')}</td><td>${escapeHtml(i[1] || '')}</td><td>${escapeHtml(i[2] || '')}</td></tr>`;
                });
            }

            const url = buildUrl(api.url);
            const exampleUrl = buildUrl(api.example);

            docContent.innerHTML = `
                <h2>${escapeHtml(api.title)}</h2>
                <div class="section">
                    <div class="desc-full">${escapeHtml(api.desc)}</div>
                </div>
                <div class="section">
                    <h3>调用地址</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(url)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(url)}">${escapeHtml(url)}</a>
                    </div>
                </div>
                <div class="section">
                    <h3>调用示例</h3>
                    <div class="url-box">
                        <a href="${escapeHtmlAttr(exampleUrl)}" target="_blank" class="copy-link" data-copy="${escapeHtmlAttr(exampleUrl)}">${escapeHtml(exampleUrl)}</a>
                    </div>
                </div>
                ${requestRows ? `
                <div class="section">
                    <h3>请求参数</h3>
                    <table>
                        <thead><tr><th>参数</th><th>类型</th><th>说明</th></tr></thead>
                        <tbody>${requestRows}</tbody>
                    </table>
                </div>` : ''}
                ${responseRows ? `
                <div class="section">
                    <h3>返回参数</h3>
                    <table>
                        <thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead>
                        <tbody>${responseRows}</tbody>
                    </table>
                </div>` : ''}
            `;

            drawer.classList.add("show");
        }

        function escapeHtmlAttr(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function closeDoc() {
            drawer.classList.remove("show");
        }

        function toggleMenu() {
            menu.classList.toggle("show");
        }

        function openGroup() {
            if (DATA?.link) window.open(DATA.link);
        }

        function showStats() {
            statsContent.innerHTML = `
                <div class="stat">
                    <div class="stat-title">总调用</div>
                    <div class="stat-value">${formatCount(DATA.Access)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">蜘蛛访问</div>
                    <div class="stat-value">${formatCount(DATA.Spider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">今日调用</div>
                    <div class="stat-value">${formatCount(DATA.todayAccess)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">今日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.todaySpider)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日调用</div>
                    <div class="stat-value">${formatCount(DATA.yesterdayAccess)}</div>
                </div>
                <div class="stat">
                    <div class="stat-title">昨日蜘蛛</div>
                    <div class="stat-value">${formatCount(DATA.yesterdaySpider)}</div>
                </div>
            `;
            statsModal.classList.add("show");
        }

        function hideStats() {
            statsModal.classList.remove("show");
        }

        // 搜索功能
        search.addEventListener("input", e => {
            if (!DATA) return;
            const keyword = e.target.value.trim().toLowerCase();
            if (!keyword) {
                renderApis(DATA.API);
                return;
            }
            renderApis(DATA.API.filter(api =>
                api.title.toLowerCase().includes(keyword) ||
                api.desc.toLowerCase().includes(keyword)
            ));
        });

        // 复制功能
        document.addEventListener("pointerdown", e => {
            const link = e.target.closest(".copy-link");
            if (!link) return;
            e.stopPropagation();
            const timer = setTimeout(() => {
                navigator.clipboard.writeText(link.dataset.copy).catch(() => {});
            }, 600);
            const clear = () => {
                clearTimeout(timer);
                document.removeEventListener("pointerup", clear);
                document.removeEventListener("pointercancel", clear);
            };
            document.addEventListener("pointerup", clear);
            document.addEventListener("pointercancel", clear);
        });

        // 点击外部关闭菜单
        document.addEventListener("click", e => {
            if (!menu.contains(e.target) && !e.target.closest(".menu-btn")) {
                menu.classList.remove("show");
            }
        });

        // 点击抽屉外部关闭
        drawer.addEventListener("click", e => {
            if (e.target === drawer) closeDoc();
        });

        // ESC关闭
        document.addEventListener("keydown", e => {
            if (e.key === "Escape") {
                closeDoc();
                hideStats();
                menu.classList.remove("show");
            }
        });
    </script>
</body>
</html>
